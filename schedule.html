<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三層スケジュール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --border: rgba(255,255,255,0.06);
    --border-light: rgba(255,255,255,0.12);
    --water: #4fc3f7;
    --water-dim: rgba(79,195,247,0.08);
    --flow: #a78bfa;
    --flow-glow: rgba(167,139,250,0.15);
    --flow-dim: rgba(167,139,250,0.08);
    --deep: #34d399;
    --deep-glow: rgba(52,211,153,0.15);
    --deep-dim: rgba(52,211,153,0.08);
    --text: #f0f0f5;
    --text-muted: rgba(240,240,245,0.45);
    --text-dim: rgba(240,240,245,0.25);
    --todo-accent: #f97316;
    --todo-dim: rgba(249,115,22,0.12);
    --radius: 20px;
    --radius-sm: 12px;
    --radius-xs: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif; -webkit-font-smoothing: antialiased; }
  #app { display: flex; flex-direction: column; height: 100dvh; }

  /* ── Header ── */
  .header { padding: 20px 20px 0; flex-shrink: 0; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 11px; font-weight: 400; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  .date-badge { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 300; color: var(--text-muted); background: var(--surface2); padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border); }

  /* ── Tabs ── */
  .tabs { display: flex; padding: 16px 20px 0; gap: 6px; flex-shrink: 0; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden; }
  .tab::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.25s; border-radius: inherit; }
  .tab[data-id="water"]::before { background: var(--water-dim); }
  .tab[data-id="flow"]::before  { background: var(--flow-dim); }
  .tab[data-id="deep"]::before  { background: var(--deep-dim); }
  .tab[data-id="water"].active { border-color: rgba(79,195,247,0.3); }
  .tab[data-id="flow"].active  { border-color: rgba(167,139,250,0.3); }
  .tab[data-id="deep"].active  { border-color: rgba(52,211,153,0.3); }
  .tab.active::before { opacity: 1; }
  .tab-icon { font-size: 18px; line-height: 1; }
  .tab-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-dim); transition: color 0.25s; }
  .tab[data-id="water"].active .tab-label { color: var(--water); }
  .tab[data-id="flow"].active .tab-label  { color: var(--flow); }
  .tab[data-id="deep"].active .tab-label  { color: var(--deep); }
  .count-chip { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; position: absolute; top: 6px; right: 6px; opacity: 0; transition: opacity 0.2s; font-family: 'Space Grotesk', sans-serif; }
  .tab[data-id="water"] .count-chip { background: var(--water); color: #000; }
  .tab[data-id="flow"]  .count-chip { background: var(--flow); color: #fff; }
  .tab[data-id="deep"]  .count-chip { background: var(--deep); color: #000; }
  .count-chip.show { opacity: 1; }

  /* ── Panels ── */
  .panels { flex: 1; overflow: hidden; position: relative; margin-top: 14px; }
  .panel { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 0 16px; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; opacity: 0; transform: translateY(12px); pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; padding-bottom: calc(32px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }
  .panel.active { opacity: 1; transform: translateY(0); pointer-events: all; }
  .panel::-webkit-scrollbar { width: 2px; }
  .panel::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 1px; }

  /* ── Glow bar ── */
  .glow-bar { height: 2px; border-radius: 1px; margin-bottom: 18px; flex-shrink: 0; }
  .glow-bar-water { background: linear-gradient(90deg, var(--water), transparent); }
  .glow-bar-flow  { background: linear-gradient(90deg, var(--flow), transparent); }
  .glow-bar-deep  { background: linear-gradient(90deg, var(--deep), transparent); }

  /* ── Section label ── */
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px; margin-top: 20px; }
  .section-label:first-child { margin-top: 0; }
  .label-water { color: var(--water); }
  .label-flow  { color: var(--flow); }
  .label-deep  { color: var(--deep); }
  .label-todo  { color: var(--todo-accent); }

  /* ── WATER ── */
  .throw-input-wrap { position: relative; margin-bottom: 14px; }
  .throw-input { width: 100%; background: var(--surface2); border: 1.5px solid rgba(79,195,247,0.2); border-radius: var(--radius-sm); color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 16px; font-weight: 300; padding: 14px 52px 14px 16px; outline: none; resize: none; transition: border-color 0.2s, box-shadow 0.2s; min-height: 52px; max-height: 200px; line-height: 1.5; }
  .throw-input::placeholder { color: var(--text-dim); }
  .throw-input:focus { border-color: rgba(79,195,247,0.5); box-shadow: 0 0 0 3px rgba(79,195,247,0.08); }
  .throw-btn { position: absolute; right: 10px; bottom: 10px; width: 34px; height: 34px; border-radius: 10px; background: var(--water); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: transform 0.15s; }
  .throw-btn:active { transform: scale(0.88); }

  .throw-items { display: flex; flex-direction: column; gap: 8px; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes flyOut  { to { opacity: 0; transform: scale(0.92) translateY(-10px); } }

  .throw-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; animation: slideIn 0.22s ease; }
  .throw-item.flying { animation: flyOut 0.26s ease forwards; pointer-events: none; }
  .throw-item-top { display: flex; align-items: flex-start; gap: 10px; }
  .throw-item-text { flex: 1; font-size: 14px; font-weight: 300; line-height: 1.5; word-break: break-all; }
  .throw-item-time { font-size: 10px; color: var(--text-dim); font-family: 'Space Grotesk', sans-serif; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
  .item-del { background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 15px; padding: 2px; flex-shrink: 0; }
  .item-del:active { color: #ef4444; }

  .slide-actions { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
  .slide-btn { flex: 1; min-width: 0; padding: 7px 6px; border-radius: 100px; border: 1.5px solid var(--border-light); background: var(--surface3); font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.18s; white-space: nowrap; text-align: center; }
  .slide-btn:active { transform: scale(0.92); }
  .slide-btn[data-dest="cal"]  { border-color: rgba(79,195,247,0.35); color: var(--water); }
  .slide-btn[data-dest="todo"] { border-color: rgba(249,115,22,0.35); color: var(--todo-accent); }
  .slide-btn[data-dest="pend"] { border-color: rgba(167,139,250,0.35); color: var(--flow); }
  .slide-btn[data-dest="deep"] { border-color: rgba(52,211,153,0.35); color: var(--deep); }

  /* ── Empty ── */
  .empty-hint { text-align: center; padding: 28px 0; color: var(--text-dim); font-size: 13px; font-weight: 300; line-height: 1.9; }
  .empty-icon { font-size: 34px; margin-bottom: 10px; opacity: 0.35; }

  /* ── FLOW: Cal items ── */
  .cal-item {
    background: var(--surface2);
    border: 1px solid var(--border); border-left: 3px solid var(--water);
    border-radius: var(--radius-sm);
    margin-bottom: 8px; overflow: hidden;
    animation: slideIn 0.22s ease;
  }
  .cal-item-main { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
  .cal-time { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 600; color: var(--water); white-space: nowrap; min-width: 36px; }
  .cal-body { flex: 1; min-width: 0; }
  .cal-text { font-size: 14px; font-weight: 300; }
  .cal-date-label { font-size: 9px; color: var(--text-dim); font-family: 'Space Grotesk', sans-serif; margin-bottom: 2px; }
  .cal-memo-display { font-size: 12px; font-weight: 300; color: var(--text-muted); margin-top: 4px; line-height: 1.5; font-style: italic; }
  .edit-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 4px 6px; border-radius: 6px; color: var(--text-dim); transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .edit-btn:active { background: var(--surface3); color: var(--text); }
  .x-btn { background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 15px; padding: 2px; flex-shrink: 0; }
  .x-btn:active { color: #ef4444; }

  /* inline edit panel inside cal-item */
  .cal-edit-panel {
    display: none; padding: 12px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface3);
    gap: 8px; flex-direction: column;
  }
  .cal-edit-panel.open { display: flex; }
  .cal-edit-row { display: flex; gap: 8px; }
  .cal-edit-input {
    flex: 1; background: var(--surface2);
    border: 1.5px solid rgba(79,195,247,0.2);
    border-radius: var(--radius-xs);
    color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; padding: 9px 11px; outline: none;
    transition: border-color 0.2s;
  }
  .cal-edit-input:focus { border-color: var(--water); }
  .cal-edit-memo {
    width: 100%; background: var(--surface2);
    border: 1.5px solid rgba(79,195,247,0.15);
    border-radius: var(--radius-xs);
    color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; padding: 9px 11px; outline: none; resize: none;
    line-height: 1.5; min-height: 60px;
    transition: border-color 0.2s;
  }
  .cal-edit-memo:focus { border-color: var(--water); }
  .cal-edit-memo::placeholder { color: var(--text-dim); }
  .cal-save-btn {
    padding: 9px 18px; border-radius: 100px;
    background: var(--water); border: none;
    color: #000; font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: transform 0.15s; align-self: flex-end;
  }
  .cal-save-btn:active { transform: scale(0.92); }

  /* ── FLOW: Todo ── */
  .todo-count-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .todo-count-badge { font-size: 11px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; padding: 4px 10px; border-radius: 100px; }
  .todo-count-badge.ok  { background: var(--todo-dim); color: var(--todo-accent); }
  .todo-count-badge.max { background: rgba(239,68,68,0.1); color: #ef4444; }

  .todo-item { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--todo-accent); border-radius: var(--radius-sm); margin-bottom: 6px; animation: slideIn 0.22s ease; overflow: hidden; }
  .todo-item.done { opacity: 0.45; }
  .todo-item-main { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
  .todo-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid rgba(249,115,22,0.4); background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
  .todo-check.checked { background: var(--todo-accent); border-color: var(--todo-accent); }
  .todo-check.checked::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
  .todo-text { flex: 1; font-size: 14px; font-weight: 300; }
  .todo-item.done .todo-text { text-decoration: line-through; }
  .todo-memo-display { font-size: 12px; font-weight: 300; color: var(--text-muted); margin-top: 3px; font-style: italic; line-height: 1.4; }

  /* inline edit for todo */
  .todo-edit-panel {
    display: none; padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface3);
    flex-direction: column; gap: 8px;
  }
  .todo-edit-panel.open { display: flex; }
  .todo-edit-date {
    background: var(--surface2);
    border: 1.5px solid rgba(249,115,22,0.2);
    border-radius: var(--radius-xs);
    color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; padding: 9px 11px; outline: none;
    transition: border-color 0.2s; width: 100%;
  }
  .todo-edit-date:focus { border-color: var(--todo-accent); }
  .todo-edit-memo {
    width: 100%; background: var(--surface2);
    border: 1.5px solid rgba(249,115,22,0.15);
    border-radius: var(--radius-xs);
    color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; padding: 9px 11px; outline: none; resize: none;
    line-height: 1.5; min-height: 60px;
    transition: border-color 0.2s;
  }
  .todo-edit-memo:focus { border-color: var(--todo-accent); }
  .todo-edit-memo::placeholder { color: var(--text-dim); }
  .todo-save-btn {
    padding: 9px 18px; border-radius: 100px;
    background: var(--todo-accent); border: none;
    color: #fff; font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: transform 0.15s; align-self: flex-end;
  }
  .todo-save-btn:active { transform: scale(0.92); }

  /* ── FLOW: Pending ── */
  .pending-item { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--flow); border-radius: var(--radius-sm); margin-bottom: 6px; animation: slideIn 0.22s ease; overflow: hidden; }
  .pending-item-main { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; }
  .pending-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; background: var(--flow-glow); color: var(--flow); padding: 2px 7px; border-radius: 100px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
  .pending-text { flex: 1; font-size: 14px; font-weight: 300; line-height: 1.5; }
  .pend-memo-display { font-size: 12px; font-weight: 300; color: var(--text-muted); margin-top: 3px; font-style: italic; line-height: 1.4; }

  /* inline edit for pending */
  .pend-edit-panel {
    display: none; padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface3);
    flex-direction: column; gap: 8px;
  }
  .pend-edit-panel.open { display: flex; }
  .pend-edit-memo {
    width: 100%; background: var(--surface2);
    border: 1.5px solid rgba(167,139,250,0.2);
    border-radius: var(--radius-xs);
    color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; padding: 9px 11px; outline: none; resize: none;
    line-height: 1.5; min-height: 60px;
    transition: border-color 0.2s;
  }
  .pend-edit-memo:focus { border-color: var(--flow); }
  .pend-edit-memo::placeholder { color: var(--text-dim); }
  .pend-save-btn {
    padding: 9px 18px; border-radius: 100px;
    background: var(--flow); border: none;
    color: #fff; font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: transform 0.15s; align-self: flex-end;
  }
  .pend-save-btn:active { transform: scale(0.92); }

  /* ── DEEP ── */
  .deep-intro { background: var(--surface2); border: 1px solid rgba(52,211,153,0.12); border-radius: var(--radius); padding: 16px; margin-bottom: 4px; }
  .deep-intro p { font-size: 13px; font-weight: 300; color: var(--text-muted); line-height: 1.8; }

  .anchor-card { background: linear-gradient(135deg, var(--surface2), var(--surface)); border: 1px solid rgba(52,211,153,0.15); border-radius: var(--radius); overflow: hidden; animation: slideIn 0.22s ease; margin-bottom: 10px; }
  .anchor-card-main { padding: 18px 16px; position: relative; }
  .anchor-card-main::before { content: ''; position: absolute; top: -40px; right: -40px; width: 100px; height: 100px; border-radius: 50%; background: var(--deep-glow); pointer-events: none; }
  .anchor-text { font-size: 15px; font-weight: 400; line-height: 1.6; color: var(--text); padding-right: 56px; }
  .anchor-meta { margin-top: 6px; font-size: 10px; color: var(--text-dim); font-family: 'Space Grotesk', sans-serif; }
  .anchor-meaning-display { margin-top: 10px; padding: 10px 12px; background: rgba(52,211,153,0.06); border-radius: var(--radius-xs); border-left: 2px solid rgba(52,211,153,0.3); }
  .anchor-meaning-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: var(--deep); margin-bottom: 4px; }
  .anchor-meaning-text { font-size: 13px; font-weight: 300; color: var(--text-muted); line-height: 1.6; }
  .anchor-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; align-items: center; }
  .anchor-edit-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 4px 6px; border-radius: 6px; color: var(--text-dim); transition: all 0.15s; }
  .anchor-edit-btn:active { background: rgba(52,211,153,0.1); color: var(--deep); }
  .anchor-del { background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 15px; padding: 2px; }
  .anchor-del:active { color: #ef4444; }

  /* anchor inline edit */
  .anchor-edit-panel {
    display: none; padding: 0 16px 16px;
    flex-direction: column; gap: 8px;
    border-top: 1px solid rgba(52,211,153,0.1);
    background: rgba(52,211,153,0.03);
  }
  .anchor-edit-panel.open { display: flex; padding-top: 14px; }
  .anchor-edit-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--deep); }
  .anchor-edit-memo {
    width: 100%; background: var(--surface2);
    border: 1.5px solid rgba(52,211,153,0.2);
    border-radius: var(--radius-xs);
    color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px; padding: 10px 12px; outline: none; resize: none;
    line-height: 1.6; min-height: 80px;
    transition: border-color 0.2s;
  }
  .anchor-edit-memo:focus { border-color: var(--deep); }
  .anchor-edit-memo::placeholder { color: var(--text-dim); }
  .anchor-save-btn {
    padding: 10px 20px; border-radius: 100px;
    background: var(--deep); border: none;
    color: #000; font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: transform 0.15s; align-self: flex-end;
  }
  .anchor-save-btn:active { transform: scale(0.92); }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface3); border: 1px solid var(--border-light); color: var(--text); font-size: 13px; font-weight: 400; padding: 10px 20px; border-radius: 100px; opacity: 0; pointer-events: none; transition: all 0.3s ease; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Cal slide sheet ── */
  .sheet-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.6); align-items: flex-end; backdrop-filter: blur(4px); }
  .sheet-overlay.show { display: flex; }
  .sheet { width: 100%; background: var(--surface2); border-radius: 24px 24px 0 0; padding: 24px 20px calc(24px + var(--safe-bottom)); border-top: 1px solid var(--border-light); animation: sheetUp 0.28s ease; }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-title { font-size: 14px; font-weight: 700; color: var(--water); margin-bottom: 14px; text-align: center; letter-spacing: 0.05em; }
  .sheet-preview { background: var(--surface3); border-radius: var(--radius-xs); padding: 10px 14px; margin-bottom: 14px; font-size: 13px; font-weight: 300; color: var(--text-muted); line-height: 1.5; word-break: break-all; }
  .sheet-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .sheet-input { flex: 1; background: var(--surface3); border: 1.5px solid rgba(79,195,247,0.2); border-radius: var(--radius-xs); color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 14px; padding: 11px 13px; outline: none; transition: border-color 0.2s; }
  .sheet-input:focus { border-color: var(--water); }
  .sheet-confirm { width: 100%; padding: 14px; background: var(--water); border: none; border-radius: var(--radius-sm); color: #000; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.15s; }
  .sheet-confirm:active { transform: scale(0.97); }
  .sheet-cancel { width: 100%; padding: 12px; margin-top: 8px; background: none; border: none; color: var(--text-dim); font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-inner">
      <span class="header-title">三層スケジュール</span>
      <span class="date-badge" id="todayLabel"></span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-id="water" onclick="switchTab('water')">
      <span class="tab-icon">🌊</span><span class="tab-label">水面</span>
      <span class="count-chip" id="waterCount"></span>
    </div>
    <div class="tab" data-id="flow" onclick="switchTab('flow')">
      <span class="tab-icon">🌀</span><span class="tab-label">流れ</span>
      <span class="count-chip" id="flowCount"></span>
    </div>
    <div class="tab" data-id="deep" onclick="switchTab('deep')">
      <span class="tab-icon">🌿</span><span class="tab-label">深層</span>
      <span class="count-chip" id="deepCount"></span>
    </div>
  </div>

  <div class="panels">

    <!-- ① 水面 -->
    <div class="panel active" id="panel-water">
      <div style="height:6px"></div>
      <div class="glow-bar glow-bar-water"></div>
      <div class="throw-input-wrap">
        <textarea class="throw-input" id="throwInput"
          placeholder="思いついたこと、なんでも投げ込む&#10;「4/3 入学式」「教科書買う」など"
          rows="1"></textarea>
        <button class="throw-btn" onclick="addThrow()">↵</button>
      </div>
      <div class="throw-items" id="throwList"></div>
    </div>

    <!-- ② 流れ -->
    <div class="panel" id="panel-flow">
      <div style="height:6px"></div>
      <div class="glow-bar glow-bar-flow"></div>

      <div class="section-label label-water" style="margin-top:0">📅 カレンダー</div>
      <div id="calList"></div>

      <div class="todo-count-row">
        <div class="section-label label-todo" style="margin:0">✅ 今日のToDo</div>
        <span class="todo-count-badge ok" id="todoBadge">0 / 3</span>
      </div>
      <div id="todoList"></div>

      <div class="section-label label-flow">💭 保留ボックス</div>
      <div id="pendList"></div>
    </div>

    <!-- ③ 深層 -->
    <div class="panel" id="panel-deep">
      <div style="height:6px"></div>
      <div class="glow-bar glow-bar-deep"></div>
      <div class="deep-intro">
        <p>「なぜこれをやるのか」を置く場所。<br>整理や行動ではなく、<strong>意味と安心</strong>のための場所です。<br><br>✏️ ボタンで「意味・気持ち」を書き足せます。</p>
      </div>
      <div class="section-label label-deep" style="margin-top:14px">🌿 私のアンカー</div>
      <div id="anchorList"></div>
    </div>

  </div>
</div>

<!-- 水面→カレンダー スライドシート -->
<div class="sheet-overlay" id="calSheet">
  <div class="sheet">
    <div class="sheet-title">📅 カレンダーへスライド</div>
    <div class="sheet-preview" id="sheetPreview"></div>
    <div class="sheet-row">
      <input class="sheet-input" id="sheetDate" type="date" />
      <input class="sheet-input" id="sheetTime" type="time" style="max-width:110px" />
    </div>
    <button class="sheet-confirm" onclick="confirmCal()">カレンダーへ ✓</button>
    <button class="sheet-cancel" onclick="closeSheet()">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS = {
  get: (k) => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

let throws    = LS.get('tl_throws');
let calItems  = LS.get('tl_cal');
let todoItems = LS.get('tl_todo');
let pendItems = LS.get('tl_pend');
let anchors   = LS.get('tl_anchors');
let sheetIdx  = null;

// track which item's edit panel is open (per list)
let calEditOpen  = null;
let todoEditOpen = null;
let pendEditOpen = null;
let anchorEditOpen = null;

function init() {
  const d = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('todayLabel').textContent = `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
  document.getElementById('sheetDate').value = d.toISOString().split('T')[0];
  render();
}

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-id="${id}"]`).classList.add('active');
  document.getElementById(`panel-${id}`).classList.add('active');
}

function render() { renderWater(); renderFlow(); renderDeep(); updateBadges(); }

/* ── WATER ── */
function renderWater() {
  const list = document.getElementById('throwList');
  if (!throws.length) {
    list.innerHTML = `<div class="empty-hint"><div class="empty-icon">💭</div>まだ何も投げ込まれていません<br>思いついたら、すぐここへ</div>`;
    return;
  }
  list.innerHTML = throws.map((item, i) => `
    <div class="throw-item" id="ti-${item.id}">
      <div class="throw-item-top">
        <div class="throw-item-text">${esc(item.text)}</div>
        <span class="throw-item-time">${item.time}</span>
        <button class="item-del" onclick="delThrow(${i})">✕</button>
      </div>
      <div class="slide-actions">
        <button class="slide-btn" data-dest="cal"  onclick="slideToCalSheet(${i})">📅 カレンダー</button>
        <button class="slide-btn" data-dest="todo" onclick="slideTo(${i},'todo')">✅ ToDo</button>
        <button class="slide-btn" data-dest="pend" onclick="slideTo(${i},'pend')">💭 保留</button>
        <button class="slide-btn" data-dest="deep" onclick="slideTo(${i},'deep')">🌿 深層へ</button>
      </div>
    </div>`).join('');
}

/* ── FLOW ── */
function renderFlow() {
  renderCal(); renderTodo(); renderPend();
}

function renderCal() {
  const cl = document.getElementById('calList');
  if (!calItems.length) {
    cl.innerHTML = `<div class="empty-hint" style="padding:12px 0 4px;font-size:12px">水面からスライドすると<br>ここに表示されます</div>`;
    return;
  }
  const sorted = [...calItems].sort((a,b) => (a.date+a.time)<(b.date+b.time)?-1:1);
  cl.innerHTML = sorted.map(item => {
    const isOpen = calEditOpen === String(item.id);
    const memoHtml = item.memo
      ? `<div class="cal-memo-display">💬 ${esc(item.memo)}</div>` : '';
    return `
    <div class="cal-item" id="ci-${item.id}">
      <div class="cal-item-main">
        <div class="cal-time">${item.time||'--:--'}</div>
        <div class="cal-body">
          <div class="cal-date-label">${fmtDate(item.date)}</div>
          <div class="cal-text">${esc(item.text)}</div>
          ${memoHtml}
        </div>
        <button class="edit-btn" onclick="toggleCalEdit('${item.id}')" title="日程・メモを編集">✏️</button>
        <button class="x-btn" onclick="delCal('${item.id}')">✕</button>
      </div>
      <div class="cal-edit-panel ${isOpen?'open':''}" id="cep-${item.id}">
        <div class="cal-edit-row">
          <input class="cal-edit-input" type="date" id="ced-${item.id}" value="${item.date||''}" />
          <input class="cal-edit-input" type="time" id="cet-${item.id}" value="${item.time||''}" style="max-width:110px"/>
        </div>
        <textarea class="cal-edit-memo" id="cem-${item.id}" placeholder="メモを追加（任意）" rows="2">${item.memo||''}</textarea>
        <button class="cal-save-btn" onclick="saveCal('${item.id}')">保存 ✓</button>
      </div>
    </div>`;
  }).join('');
}

function toggleCalEdit(id) {
  calEditOpen = calEditOpen === String(id) ? null : String(id);
  renderCal();
}

function saveCal(id) {
  const item = calItems.find(x => String(x.id) === String(id));
  if (!item) return;
  item.date = document.getElementById(`ced-${id}`).value || item.date;
  item.time = document.getElementById(`cet-${id}`).value;
  item.memo = document.getElementById(`cem-${id}`).value.trim();
  LS.set('tl_cal', calItems);
  calEditOpen = null;
  renderCal();
  updateBadges();
  showToast('日程を更新しました 📅');
}

function renderTodo() {
  const tl = document.getElementById('todoList');
  const badge = document.getElementById('todoBadge');
  const act = todoItems.filter(t=>!t.done).length;
  badge.textContent = `${act} / 3`;
  badge.className = `todo-count-badge ${act>3?'max':'ok'}`;
  if (!todoItems.length) {
    tl.innerHTML = `<div class="empty-hint" style="padding:12px 0 4px;font-size:12px">水面からスライドすると<br>ここに表示されます</div>`;
    return;
  }
  tl.innerHTML = todoItems.map(item => {
    const isOpen = todoEditOpen === String(item.id);
    const memoHtml = item.memo ? `<div class="todo-memo-display">💬 ${esc(item.memo)}</div>` : '';
    const dateHtml = item.dueDate ? `<div style="font-size:10px;color:var(--todo-accent);margin-top:2px;font-family:'Space Grotesk',sans-serif">📅 ${fmtDate(item.dueDate)}</div>` : '';
    return `
    <div class="todo-item ${item.done?'done':''}" id="tdi-${item.id}">
      <div class="todo-item-main">
        <div class="todo-check ${item.done?'checked':''}" onclick="toggleTodo('${item.id}')"></div>
        <div style="flex:1;min-width:0">
          <div class="todo-text">${esc(item.text)}</div>
          ${dateHtml}${memoHtml}
        </div>
        <button class="edit-btn" onclick="toggleTodoEdit('${item.id}')">✏️</button>
        <button class="x-btn" onclick="delTodo('${item.id}')">✕</button>
      </div>
      <div class="todo-edit-panel ${isOpen?'open':''}" id="tep-${item.id}">
        <input class="todo-edit-date" type="date" id="ted-${item.id}" value="${item.dueDate||''}" placeholder="期日（任意）"/>
        <textarea class="todo-edit-memo" id="tem-${item.id}" placeholder="メモを追加（任意）" rows="2">${item.memo||''}</textarea>
        <button class="todo-save-btn" onclick="saveTodo('${item.id}')">保存 ✓</button>
      </div>
    </div>`;
  }).join('');
}

function toggleTodoEdit(id) {
  todoEditOpen = todoEditOpen === String(id) ? null : String(id);
  renderTodo();
}

function saveTodo(id) {
  const item = todoItems.find(x => String(x.id) === String(id));
  if (!item) return;
  item.dueDate = document.getElementById(`ted-${id}`).value;
  item.memo    = document.getElementById(`tem-${id}`).value.trim();
  LS.set('tl_todo', todoItems);
  todoEditOpen = null;
  renderTodo();
  showToast('ToDoを更新しました ✅');
}

function renderPend() {
  const pl = document.getElementById('pendList');
  if (!pendItems.length) {
    pl.innerHTML = `<div class="empty-hint" style="padding:12px 0 4px;font-size:12px">水面からスライドすると<br>ここに表示されます</div>`;
    return;
  }
  pl.innerHTML = pendItems.map(item => {
    const isOpen = pendEditOpen === String(item.id);
    const memoHtml = item.memo ? `<div class="pend-memo-display">💬 ${esc(item.memo)}</div>` : '';
    return `
    <div class="pending-item" id="pi-${item.id}">
      <div class="pending-item-main">
        <div class="pending-tag">保留</div>
        <div style="flex:1;min-width:0">
          <div class="pending-text">${esc(item.text)}</div>
          ${memoHtml}
        </div>
        <button class="edit-btn" onclick="togglePendEdit('${item.id}')">✏️</button>
        <button class="x-btn" onclick="delPend('${item.id}')">✕</button>
      </div>
      <div class="pend-edit-panel ${isOpen?'open':''}" id="pep-${item.id}">
        <textarea class="pend-edit-memo" id="pem-${item.id}" placeholder="気になっていること、感じていることなど" rows="2">${item.memo||''}</textarea>
        <button class="pend-save-btn" onclick="savePend('${item.id}')">保存 ✓</button>
      </div>
    </div>`;
  }).join('');
}

function togglePendEdit(id) {
  pendEditOpen = pendEditOpen === String(id) ? null : String(id);
  renderPend();
}

function savePend(id) {
  const item = pendItems.find(x => String(x.id) === String(id));
  if (!item) return;
  item.memo = document.getElementById(`pem-${id}`).value.trim();
  LS.set('tl_pend', pendItems);
  pendEditOpen = null;
  renderPend();
  showToast('保留メモを更新しました 💭');
}

/* ── DEEP ── */
function renderDeep() {
  const list = document.getElementById('anchorList');
  if (!anchors.length) {
    list.innerHTML = `<div class="empty-hint"><div class="empty-icon">🌿</div>水面のメモを「🌿 深層へ」で<br>スライドしてみましょう</div>`;
    return;
  }
  list.innerHTML = anchors.map(item => {
    const isOpen = anchorEditOpen === String(item.id);
    const meaningHtml = item.meaning ? `
      <div class="anchor-meaning-display">
        <div class="anchor-meaning-label">MEANING</div>
        <div class="anchor-meaning-text">${esc(item.meaning)}</div>
      </div>` : '';
    return `
    <div class="anchor-card" id="ac-${item.id}">
      <div class="anchor-card-main">
        <div class="anchor-actions">
          <button class="anchor-edit-btn" onclick="toggleAnchorEdit('${item.id}')">✏️</button>
          <button class="anchor-del" onclick="delAnchor('${item.id}')">✕</button>
        </div>
        <div class="anchor-text">${esc(item.text)}</div>
        <div class="anchor-meta">${item.date}</div>
        ${meaningHtml}
      </div>
      <div class="anchor-edit-panel ${isOpen?'open':''}" id="aep-${item.id}">
        <div class="anchor-edit-label">✨ 意味・気持ちを書き足す</div>
        <textarea class="anchor-edit-memo" id="aem-${item.id}"
          placeholder="例：「これがあると安心できる」&#10;「自分を守るために大切なこと」" rows="3">${item.meaning||''}</textarea>
        <button class="anchor-save-btn" onclick="saveAnchor('${item.id}')">保存 ✓</button>
      </div>
    </div>`;
  }).join('');
}

function toggleAnchorEdit(id) {
  anchorEditOpen = anchorEditOpen === String(id) ? null : String(id);
  renderDeep();
}

function saveAnchor(id) {
  const item = anchors.find(x => String(x.id) === String(id));
  if (!item) return;
  item.meaning = document.getElementById(`aem-${id}`).value.trim();
  LS.set('tl_anchors', anchors);
  anchorEditOpen = null;
  renderDeep();
  showToast('意味を書き足しました 🌿');
}

/* ── badges ── */
function updateBadges() {
  const wc = document.getElementById('waterCount');
  wc.textContent = throws.length||''; wc.classList.toggle('show', throws.length>0);
  const ft = calItems.length + todoItems.filter(t=>!t.done).length + pendItems.length;
  const fc = document.getElementById('flowCount');
  fc.textContent = ft||''; fc.classList.toggle('show', ft>0);
  const dc = document.getElementById('deepCount');
  dc.textContent = anchors.length||''; dc.classList.toggle('show', anchors.length>0);
}

/* ── Water: add/delete ── */
function addThrow() {
  const inp = document.getElementById('throwInput');
  const text = inp.value.trim();
  if (!text) return;
  const now = new Date();
  throws.unshift({ text, time: formatTime(now), id: now.getTime() });
  LS.set('tl_throws', throws);
  inp.value = ''; inp.style.height = '';
  render();
  showToast('投げ込みました 🌊');
}
function delThrow(i) { throws.splice(i,1); LS.set('tl_throws',throws); render(); }

/* ── Slide animation ── */
function fly(id, cb) {
  const el = document.getElementById(`ti-${id}`);
  if (!el) { cb(); return; }
  el.classList.add('flying');
  setTimeout(cb, 250);
}

function slideTo(i, dest) {
  const item = throws[i];
  if (!item) return;
  if (dest==='todo' && todoItems.filter(t=>!t.done).length>=3) { showToast('ToDoは3つまで ✋'); return; }
  fly(item.id, () => {
    throws.splice(i,1); LS.set('tl_throws',throws);
    const now = new Date();
    const ds = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
    if (dest==='todo') { todoItems.push({text:item.text,done:false,id:item.id,memo:'',dueDate:''}); LS.set('tl_todo',todoItems); showToast('ToDoへスライド ✅'); }
    if (dest==='pend') { pendItems.push({text:item.text,id:item.id,memo:''}); LS.set('tl_pend',pendItems); showToast('保留ボックスへ 💭'); }
    if (dest==='deep') { anchors.unshift({text:item.text,date:ds,id:item.id,meaning:''}); LS.set('tl_anchors',anchors); showToast('深層へスライド 🌿'); }
    render();
  });
}

/* ── Cal slide sheet ── */
function slideToCalSheet(i) {
  sheetIdx = i;
  document.getElementById('sheetPreview').textContent = throws[i].text;
  document.getElementById('sheetTime').value = '';
  document.getElementById('calSheet').classList.add('show');
}
function confirmCal() {
  if (sheetIdx===null) return;
  const item = throws[sheetIdx];
  const date = document.getElementById('sheetDate').value || new Date().toISOString().split('T')[0];
  const time = document.getElementById('sheetTime').value || '';
  const si = sheetIdx;
  closeSheet();
  fly(item.id, () => {
    throws.splice(si,1); LS.set('tl_throws',throws);
    calItems.push({text:item.text,date,time,id:item.id,memo:''}); LS.set('tl_cal',calItems);
    showToast('カレンダーへスライド 📅');
    render();
  });
  sheetIdx = null;
}
function closeSheet() { document.getElementById('calSheet').classList.remove('show'); sheetIdx=null; }
document.getElementById('calSheet').addEventListener('click', e => { if(e.target===e.currentTarget) closeSheet(); });

/* ── Delete ── */
function delCal(id)   { calItems=calItems.filter(x=>String(x.id)!==String(id));   LS.set('tl_cal',calItems);   calEditOpen=null;    renderCal();  updateBadges(); }
function delTodo(id)  { todoItems=todoItems.filter(x=>String(x.id)!==String(id)); LS.set('tl_todo',todoItems); todoEditOpen=null;   renderTodo(); updateBadges(); }
function delPend(id)  { pendItems=pendItems.filter(x=>String(x.id)!==String(id)); LS.set('tl_pend',pendItems); pendEditOpen=null;   renderPend(); updateBadges(); }
function delAnchor(id){ anchors=anchors.filter(x=>String(x.id)!==String(id));     LS.set('tl_anchors',anchors); anchorEditOpen=null; renderDeep(); updateBadges(); }
function toggleTodo(id){ const t=todoItems.find(x=>String(x.id)===String(id)); if(t){t.done=!t.done;LS.set('tl_todo',todoItems);renderTodo();updateBadges();} }

/* ── Helpers ── */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function formatTime(d){ return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmtDate(s){ if(!s)return''; const days=['日','月','火','水','木','金','土']; const day=new Date(s).getDay(); const[,m,d]=s.split('-'); return `${m}/${d}（${days[day]}）`; }

let toastT;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

document.getElementById('throwInput').addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,160)+'px'; });
document.getElementById('throwInput').addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addThrow();} });

init();
</script>
</body>
</html>
