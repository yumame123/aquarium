<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>人工無能</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #0c0a09;
  --surface:    #141210;
  --panel:      #1c1916;
  --border:     #2a2420;
  --accent:     #b8882a;
  --accent-dim: #7a5c1a;
  --glow:       rgba(184,136,42,0.12);
  --text:       #ddd0b4;
  --text-dim:   #7a6d58;
  --text-faint: #3e3830;
  --bot-bg:     #161310;
  --user-bg:    #101410;
  --good:       #4a8a40;
  --bad:        #8a4040;
  --topbar-h:   54px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  height: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

body::before {
  content:'';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ═══════════ TOP BAR ═══════════ */
.topbar {
  height: var(--topbar-h);
  padding-top: env(safe-area-inset-top, 0px);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding-left: 14px;
  padding-right: 14px;
  gap: 11px;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
}

.menu-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 8px 6px;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.2s;
}
.menu-btn:active { color: var(--accent); }

.topbar-av-wrap {
  position: relative;
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  cursor: pointer;
}
.topbar-av {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--accent-dim);
  display: block;
}
.topbar-arc {
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--accent);
  border-right-color: var(--accent-dim);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
body.thinking .topbar-arc { opacity: 1; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.topbar-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.topbar-name {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  letter-spacing: 0.06em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-phase {
  font-size: 10px;
  color: var(--text-dim);
  font-style: italic;
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══════════ BACKDROP ═══════════ */
.backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 15;
}
.backdrop.open { display: block; animation: bfadeIn 0.25s ease; }
@keyframes bfadeIn { from { opacity:0; } to { opacity:1; } }

/* ═══════════ DRAWER ═══════════ */
.drawer {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: env(safe-area-inset-top, 14px) 16px 24px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  padding-top: 8px;
  flex-shrink: 0;
}
.close-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12px;
  padding: 5px 11px;
  border-radius: 6px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
.close-btn:active { border-color: var(--accent); color: var(--accent); }

/* Character frame */
.char-wrap {
  position: relative;
  width: 120px;
  height: 120px;
  cursor: pointer;
  flex-shrink: 0;
}
.char-img {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  background: var(--panel);
  position: relative;
  z-index: 1;
}
.char-ring {
  position: absolute; inset: -3px;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  box-shadow: 0 0 16px var(--glow), inset 0 0 16px var(--glow);
  z-index: 2; pointer-events: none;
}
.char-outer-ring {
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 1px solid var(--border);
  z-index: 0; pointer-events: none;
}
.drawer-arc {
  position: absolute; inset: -5px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--accent);
  border-right-color: var(--accent-dim);
  z-index: 3; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
}
body.thinking .drawer-arc { opacity: 1; animation: spin 1.2s linear infinite; }
.char-hover {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.3s;
  z-index: 4; font-size: 10px; color: transparent;
  letter-spacing: 0.08em;
}
.char-wrap:hover .char-hover,
.char-wrap:active .char-hover { background: rgba(0,0,0,0.55); color: var(--accent); }

#imgInput { display: none; }

.name-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: 'Shippori Mincho', serif;
  font-size: 16px;
  text-align: center;
  width: 100%;
  padding: 3px 0;
  outline: none;
  letter-spacing: 0.08em;
  transition: border-color 0.3s;
}
.name-input:focus { border-bottom-color: var(--accent); }

.stats { width: 100%; display: flex; flex-direction: column; gap: 14px; }
.stat  { display: flex; flex-direction: column; gap: 5px; }
.stat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; }
.stat-row   { display: flex; justify-content: space-between; align-items: baseline; }
.stat-val   { font-size: 13px; color: var(--accent); font-family: 'Shippori Mincho', serif; }
.bar        { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.bar-fill   { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border-radius: 1px; transition: width 1s ease; }

.phase-text {
  font-size: 11px; color: var(--text-dim);
  text-align: center; letter-spacing: 0.04em;
  font-style: italic; line-height: 1.6; padding-top: 4px;
}

/* ═══════════ DESKTOP LAYOUT ≥620px ═══════════ */
@media (min-width: 620px) {
  body { flex-direction: row; }
  .topbar   { display: none; }
  .backdrop { display: none !important; }

  .drawer {
    position: static;
    transform: none !important;
    transition: none;
    width: 200px;
    min-width: 200px;
    flex-shrink: 0;
    padding-top: 28px;
    overflow-y: auto;
  }
  .drawer-header { display: none; }
}

/* ═══════════ MAIN ═══════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 1;
  min-height: 0;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media (min-width: 620px) {
  .chat { padding: 28px 22px; gap: 18px; }
}

.welcome {
  text-align: center;
  color: var(--text-faint);
  font-size: 13px;
  line-height: 2.2;
  letter-spacing: 0.06em;
  padding: 50px 20px;
  font-style: italic;
  font-family: 'Shippori Mincho', serif;
}

/* Messages */
.msg { display: flex; flex-direction: column; gap: 5px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(5px); }
  to   { opacity:1; transform: translateY(0); }
}

.msg-user { align-items: flex-end; }
.msg-bot  { align-items: flex-start; }

.msg-label {
  font-size: 10px; color: var(--text-faint);
  letter-spacing: 0.1em; padding: 0 3px;
}

.bubble {
  max-width: 84%;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.85;
  letter-spacing: 0.03em;
  word-break: break-all;
}
@media (min-width: 620px) { .bubble { max-width: 72%; } }

.bubble-user {
  background: var(--user-bg);
  border: 1px solid #1e2a1a;
  border-radius: 14px 14px 3px 14px;
  color: var(--text);
}
.bubble-bot {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-radius: 14px 14px 14px 3px;
  color: var(--text);
  box-shadow: 0 2px 16px rgba(0,0,0,0.35);
  position: relative;
}
.bubble-bot::before {
  content:''; position: absolute; inset: 0;
  border-radius: inherit; background: var(--glow);
  opacity: 0; animation: glowFade 1s ease forwards; pointer-events: none;
}
@keyframes glowFade { 0% { opacity:1; } 100% { opacity:0; } }

/* Rating */
.rating { display: flex; gap: 6px; padding: 0 2px; }
.rate-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  letter-spacing: 0.04em;
  min-height: 34px;
}
.rate-btn:active:not(:disabled) { transform: scale(0.94); }
.rate-btn:hover:not(:disabled)  { border-color: var(--accent); color: var(--text); }
.rate-btn.good { background: rgba(74,138,64,0.2); border-color: var(--good); color: #7ac870; }
.rate-btn.bad  { background: rgba(138,64,64,0.2);  border-color: var(--bad);  color: #c87070; }
.rate-btn:disabled { cursor: default; }

/* Thinking */
.thinking-dots {
  display: flex; gap: 5px;
  padding: 12px 16px;
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-radius: 14px 14px 14px 3px;
  width: fit-content;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
  0%,80%,100% { opacity:0.25; transform:scale(0.75); }
  40%          { opacity:1;    transform:scale(1); }
}

/* ═══════════ INPUT AREA ═══════════ */
.input-area {
  padding: 10px 12px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--surface);
  flex-shrink: 0;
  align-items: flex-end;
}
@media (min-width: 620px) { .input-area { padding: 14px 20px; } }

.txt-input {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 13px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  font-size: 15px;
  outline: none;
  transition: border-color 0.3s;
  resize: none;
  line-height: 1.55;
  max-height: 110px;
  overflow-y: auto;
  letter-spacing: 0.03em;
}
.txt-input:focus { border-color: var(--accent-dim); }
.txt-input::placeholder { color: var(--text-faint); }

.send-btn {
  background: var(--panel);
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  width: 42px; height: 42px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:active:not(:disabled) { background: var(--accent-dim); transform: scale(0.93); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<!-- Top bar (mobile) -->
<div class="topbar">
  <button class="menu-btn" onclick="openDrawer()" aria-label="メニュー">
    <svg width="20" height="15" viewBox="0 0 20 15" fill="none">
      <rect width="20" height="2" rx="1" fill="currentColor"/>
      <rect y="6.5" width="20" height="2" rx="1" fill="currentColor"/>
      <rect y="13" width="20" height="2" rx="1" fill="currentColor"/>
    </svg>
  </button>
  <div class="topbar-av-wrap" onclick="document.getElementById('imgInput').click()">
    <img class="topbar-av" id="topbarImg" alt="">
    <div class="topbar-arc"></div>
  </div>
  <div class="topbar-info">
    <div class="topbar-name"  id="topbarName">無能</div>
    <div class="topbar-phase" id="topbarPhase">まだ言葉を知りません</div>
  </div>
</div>

<!-- Backdrop -->
<div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>

<!-- Drawer / Sidebar -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <button class="close-btn" onclick="closeDrawer()">✕ 閉じる</button>
  </div>

  <div class="char-wrap" onclick="document.getElementById('imgInput').click()">
    <img class="char-img" id="charImg" alt="">
    <div class="char-ring"></div>
    <div class="char-outer-ring"></div>
    <div class="drawer-arc"></div>
    <div class="char-hover">画像を変更</div>
  </div>
  <input type="file" id="imgInput" accept="image/*">

  <input class="name-input" id="charName" value="無能" maxlength="12" placeholder="名前">

  <div class="stats">
    <div class="stat">
      <div class="stat-row">
        <span class="stat-label">語彙数</span>
        <span class="stat-val" id="sVocab">0</span>
      </div>
      <div class="bar"><div class="bar-fill" id="bVocab" style="width:0%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-row">
        <span class="stat-label">習熟度</span>
        <span class="stat-val" id="sConf">0%</span>
      </div>
      <div class="bar"><div class="bar-fill" id="bConf" style="width:0%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-row">
        <span class="stat-label">会話数</span>
        <span class="stat-val" id="sTurns">0</span>
      </div>
    </div>
    <div class="stat">
      <div class="stat-row">
        <span class="stat-label">評価済み</span>
        <span class="stat-val" id="sRated">0</span>
      </div>
    </div>
  </div>
  <div class="phase-text" id="phaseText">まだ言葉を知りません</div>
</div>

<!-- Main -->
<div class="main">
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      話しかけてみてください。<br>
      わたしはあなたの言葉からしか<br>
      学ぶことができません。
    </div>
  </div>
  <div class="input-area">
    <textarea class="txt-input" id="txt" placeholder="メッセージを入力…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="onSend()" aria-label="送信">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M3 17.5L17.5 10L3 2.5V8.5L13 10L3 11.5V17.5Z" fill="currentColor"/>
      </svg>
    </button>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   MUNOU ENGINE
══════════════════════════════════════ */
class Munou {
  constructor() {
    this.trans = new Map();
    this.starts = new Map();
    this.totalTok = 0;
    this.totalTurns = 0;
    this.ratedCount = 0;
    this.lastTok = [];
  }

  tokenize(text) {
    text = text.trim();
    if (!text) return [];
    const segs = text.split(/[。！？!?\n]/u).map(s => s.trim()).filter(Boolean);
    const out = [];
    for (const s of segs) out.push(...this._segTok(s));
    return out;
  }

  _segTok(text) {
    if (!text) return [];
    const P = [
      'ください','ません','ました','でした','じゃない',
      'から','まで','より','って','ない','ても','ては','では','には','への',
      'との','もの','でも','のに','ので','のは','のが','のを','はず','かも',
      'して','した','しい','なの','ちゃ','じゃ',
      'これ','それ','あれ','どれ','この','その','あの','どの',
      'ます','です','だが','する','ある','いる',
      'は','が','を','に','で','も','の','と','へ','か','や',
      'ね','よ','な','し','て','た','だ','ぞ','わ','さ','け'
    ];
    const toks = [];
    let cur = '', i = 0;
    while (i < text.length) {
      if (text[i] === ' ' || text[i] === '　') {
        if (cur) { toks.push(cur); cur = ''; }
        i++; continue;
      }
      let hit = false;
      for (const p of P) {
        if (text.startsWith(p, i)) {
          if (cur) { toks.push(cur); cur = ''; }
          toks.push(p); i += p.length; hit = true; break;
        }
      }
      if (!hit) { cur += text[i]; i++; }
    }
    if (cur) toks.push(cur);
    return toks.filter(t => t.length > 0);
  }

  learn(text) {
    const toks = this.tokenize(text);
    if (!toks.length) return;
    this._addW(this.starts, toks[0], 1);
    for (let i = 0; i < toks.length - 1; i++) {
      if (!this.trans.has(toks[i])) this.trans.set(toks[i], new Map());
      this._addW(this.trans.get(toks[i]), toks[i+1], 1);
    }
    this.totalTok += toks.length;
    this.totalTurns++;
  }

  _addW(map, key, d) { map.set(key, (map.get(key) || 0) + d); }

  _pick(map) {
    if (!map || !map.size) return null;
    const e = [...map.entries()].filter(([,w]) => w > 0.001);
    if (!e.length) return null;
    const tot = e.reduce((s,[,w]) => s+w, 0);
    let r = Math.random() * tot;
    for (const [k,w] of e) { r -= w; if (r <= 0) return k; }
    return e[e.length-1][0];
  }

  generate(userInput) {
    if (this.totalTok < 5) {
      this.lastTok = this.tokenize(userInput);
      return userInput;
    }
    if (this.totalTok < 18) {
      const toks = this.tokenize(userInput);
      const known = [...this.starts.keys()];
      const out = toks.map(t =>
        (Math.random() < 0.25 && known.length)
          ? known[Math.floor(Math.random() * known.length)] : t
      );
      this.lastTok = out;
      return out.join('');
    }
    const targetLen = 4 + Math.floor(Math.log(this.totalTok + 1) * 2.5);
    const result = [];
    let cur;
    if (Math.random() < 0.3) {
      const ut = this.tokenize(userInput)[0];
      cur = (ut && this.trans.has(ut)) ? ut : this._pick(this.starts);
    } else {
      cur = this._pick(this.starts);
    }
    if (!cur) {
      const keys = [...this.trans.keys()];
      cur = keys[Math.floor(Math.random() * keys.length)];
    }
    if (!cur) { this.lastTok = []; return userInput; }
    result.push(cur);
    for (let i = 0; i < targetLen; i++) {
      const nxt = this._pick(this.trans.get(cur));
      if (!nxt) break;
      result.push(nxt); cur = nxt;
    }
    this.lastTok = result;
    return result.join('');
  }

  reinforce(positive) {
    const factor = positive ? 1.65 : 0.45;
    const toks = this.lastTok;
    for (let i = 0; i < toks.length - 1; i++) {
      const nexts = this.trans.get(toks[i]);
      if (nexts && nexts.has(toks[i+1]))
        nexts.set(toks[i+1], Math.max(0.001, nexts.get(toks[i+1]) * factor));
    }
    if (toks[0])
      this.starts.set(toks[0], Math.max(0.001,
        (this.starts.get(toks[0]) || 1) * (positive ? 1.35 : 0.65)));
    this.ratedCount++;
  }

  get phase() {
    if (this.totalTok < 5)   return 'まだ言葉を知りません';
    if (this.totalTok < 18)  return 'おぼろげに覚え始めました';
    if (this.totalTok < 45)  return '言葉を紡ぎ始めました';
    if (this.totalTok < 100) return '少しずつ話せるようになってきました';
    if (this.totalTok < 200) return 'だいぶ語れるようになりました';
    return '豊かな語りができるようになりました';
  }
  get vocabSize()  { return this.starts.size; }
  get confidence() { return Math.min(100, Math.floor(Math.sqrt(this.totalTok) * 9)); }
}

/* ══════════════════════════════════════
   DRAWER
══════════════════════════════════════ */
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}

// Swipe left on drawer to close
let swipeX = 0;
const drawerEl = document.getElementById('drawer');
drawerEl.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive: true });
drawerEl.addEventListener('touchend',   e => { if (e.changedTouches[0].clientX - swipeX < -55) closeDrawer(); }, { passive: true });

/* ══════════════════════════════════════
   SYNC: image / name
══════════════════════════════════════ */
document.getElementById('imgInput').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const rd = new FileReader();
  rd.onload = ev => {
    document.getElementById('charImg').src   = ev.target.result;
    document.getElementById('topbarImg').src = ev.target.result;
  };
  rd.readAsDataURL(f);
});

document.getElementById('charName').addEventListener('input', function() {
  document.getElementById('topbarName').textContent = this.value.trim() || '無能';
});

/* ══════════════════════════════════════
   UI
══════════════════════════════════════ */
const munou = new Munou();
let busy = false, msgId = 0;
const tokMap = {};

function updateStats() {
  const v = munou.vocabSize, c = munou.confidence, ph = munou.phase;
  document.getElementById('sVocab').textContent      = v;
  document.getElementById('bVocab').style.width      = Math.min(100, v * 1.8) + '%';
  document.getElementById('sConf').textContent       = c + '%';
  document.getElementById('bConf').style.width       = c + '%';
  document.getElementById('sTurns').textContent      = munou.totalTurns;
  document.getElementById('sRated').textContent      = munou.ratedCount;
  document.getElementById('phaseText').textContent   = ph;
  document.getElementById('topbarPhase').textContent = ph;
}

function rmWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMsg(text, isUser, id = null) {
  rmWelcome();
  const chat = document.getElementById('chat');
  const name = document.getElementById('charName').value.trim() || '無能';

  const wrap   = document.createElement('div');
  wrap.className = 'msg msg-' + (isUser ? 'user' : 'bot');

  const label  = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = isUser ? 'あなた' : name;

  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-' + (isUser ? 'user' : 'bot');
  bubble.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(bubble);

  if (!isUser && id !== null) {
    const rating = document.createElement('div');
    rating.className = 'rating';
    const good = document.createElement('button');
    good.className = 'rate-btn';
    good.textContent = '👍 良い';
    const bad  = document.createElement('button');
    bad.className  = 'rate-btn';
    bad.textContent = '👎 悪い';
    const doRate = pos => {
      if (tokMap[id]) { munou.lastTok = tokMap[id]; munou.reinforce(pos); }
      good.disabled = bad.disabled = true;
      good.classList.toggle('good', pos);
      bad.classList.toggle('bad', !pos);
      updateStats();
    };
    good.onclick = () => doRate(true);
    bad.onclick  = () => doRate(false);
    rating.appendChild(good);
    rating.appendChild(bad);
    wrap.appendChild(rating);
  }

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showThinking() {
  rmWelcome();
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'msg msg-bot';
  el.id = 'thinkEl';
  el.innerHTML = '<div class="thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  document.body.classList.add('thinking');
}

function hideThinking() {
  const el = document.getElementById('thinkEl');
  if (el) el.remove();
  document.body.classList.remove('thinking');
}

function thinkDelay() {
  return 400 + Math.min(2000, munou.totalTok * 25) + Math.random() * 300;
}

const txtEl = document.getElementById('txt');

txtEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(110, this.scrollHeight) + 'px';
});

txtEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSend(); }
});

async function onSend() {
  if (busy) return;
  const txt = txtEl.value.trim();
  if (!txt) return;

  txtEl.value = '';
  txtEl.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  busy = true;

  addMsg(txt, true);
  munou.learn(txt);
  updateStats();

  showThinking();
  await new Promise(r => setTimeout(r, thinkDelay()));

  const resp = munou.generate(txt);
  const toks = [...munou.lastTok];
  hideThinking();

  const id = ++msgId;
  tokMap[id] = toks;
  addMsg(resp, false, id);
  updateStats();

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

updateStats();
</script>
