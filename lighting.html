<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scholarium</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05071a;--accent:#e8a85f;--text:#c2d0f0;--dim:#4a5a88;
  --serif:'Noto Serif JP',serif;--sans:'Noto Sans JP',sans-serif;
  --room:#090d24;--corridor:#0f1530;--corr-light:rgba(100,140,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--sans);color:var(--text)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 95%,rgba(255,130,30,0.04) 0%,transparent 45%),radial-gradient(ellipse at 80% 5%,rgba(50,70,200,0.06) 0%,transparent 45%);pointer-events:none;z-index:0}
.stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.4}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column}

/* Header */
header{padding:16px 18px 10px;border-bottom:1px solid rgba(80,110,200,0.15);background:rgba(5,7,26,0.95);backdrop-filter:blur(14px);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.h-title{font-family:var(--serif);font-size:19px;font-weight:300;letter-spacing:.12em}
.h-sub{font-size:9px;color:var(--dim);letter-spacing:.22em;text-transform:uppercase;margin-top:1px}
.h-count{font-family:var(--serif);font-size:11px;color:var(--dim)}
.h-count span{color:var(--accent);font-size:19px;font-weight:300;vertical-align:middle;margin-right:1px}

/* Floor Tabs */
.floor-tabs{display:flex;gap:5px;padding:9px 14px;overflow-x:auto;scrollbar-width:none;background:rgba(6,9,28,0.8);border-bottom:1px solid rgba(70,100,180,0.14);flex-shrink:0}
.floor-tabs::-webkit-scrollbar{display:none}
.floor-tab{flex-shrink:0;padding:5px 14px;border:1px solid rgba(70,100,180,0.2);border-radius:20px;background:transparent;color:var(--dim);font-family:var(--serif);font-size:12px;cursor:pointer;transition:all .22s}
.floor-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(232,168,95,0.07);box-shadow:0 0 12px rgba(232,168,95,0.2)}
.floor-tab .tdot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin-left:4px;vertical-align:middle;opacity:0;transition:opacity .2s}
.floor-tab.has-chars .tdot{opacity:1}

/* Map */
.map-area{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(80,110,200,0.2) transparent;position:relative;padding:14px 12px 90px}
.map-area::-webkit-scrollbar{width:3px}
.map-area::-webkit-scrollbar-thumb{background:rgba(80,110,200,0.2);border-radius:2px}
.plan-wrap{position:relative}
.plan-inner{position:relative;transform-origin:top left}
.plan-bg{position:absolute;inset:0;background:#080c22;border:2px solid rgba(80,120,220,0.35);border-radius:3px;overflow:hidden}
.plan-bg::after{content:’’;position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(60,90,200,0.04) 0%,transparent 70%)}
.plan-corr{position:absolute;background:var(--corridor)}
.plan-corr::after{content:’’;position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--corr-light) 30%,var(--corr-light) 70%,transparent)}
.plan-corr-light{position:absolute;height:1px;background:linear-gradient(90deg,transparent,rgba(140,180,255,0.12),rgba(140,180,255,0.12),transparent);pointer-events:none}

/* Rooms */
.plan-room{position:absolute;background:var(--room);border:1px solid rgba(60,90,180,0.28);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;overflow:hidden;user-select:none;transition:background .18s;z-index:4}
.plan-room.occ{border-color:rgba(232,168,95,0.32)}
.plan-room:active{background:rgba(232,168,95,0.1) !important}
.plan-room.restricted{cursor:default;opacity:0.5}
.plan-room.restricted:active{background:var(--room) !important}
.plan-room.staff-room{border-color:rgba(100,140,220,0.4);cursor:pointer}
.plan-room.top-room::after{content:’’;position:absolute;inset:0;background:linear-gradient(to bottom,rgba(80,110,220,0.04) 0%,transparent 50%);pointer-events:none}
.plan-room.bot-room::after{content:’’;position:absolute;inset:0;background:linear-gradient(to top,rgba(80,110,220,0.04) 0%,transparent 50%);pointer-events:none}
.plan-room-name{font-family:var(--sans);font-size:9px;color:rgba(180,200,250,0.8);line-height:1.6;padding:2px 3px;position:relative;z-index:1;pointer-events:none;word-break:keep-all}
.plan-room.wide .plan-room-name{font-size:10.5px;font-family:var(--serif)}
.plan-room-badge{position:absolute;bottom:3px;right:4px;font-size:7px;color:rgba(232,168,95,0.65);pointer-events:none;z-index:2}
.plan-room-dot{position:absolute;top:4px;left:4px;width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;pointer-events:none;z-index:2;transition:opacity .3s}
.plan-room.occ .plan-room-dot{opacity:0.7}
.plan-room-icon{font-size:9px;opacity:0.3;pointer-events:none;margin-bottom:2px}
.plan-door{position:absolute;background:var(--corridor);pointer-events:none;z-index:3}
.plan-corr-label{position:absolute;font-size:6.5px;letter-spacing:.15em;color:rgba(80,110,180,0.45);text-transform:uppercase;pointer-events:none;z-index:2}
.plan-window{position:absolute;pointer-events:none}

/* Stairs */
.plan-stairs{position:absolute;background:repeating-linear-gradient(-45deg,transparent,transparent 2.5px,rgba(80,110,200,0.09) 2.5px,rgba(80,110,200,0.09) 3px);border-left:1px solid rgba(80,110,200,0.25);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;pointer-events:none}
.plan-stairs.left-stairs{border-left:none;border-right:1px solid rgba(80,110,200,0.2);z-index:2}
.plan-stairs-text{writing-mode:vertical-rl;font-size:5px;letter-spacing:.18em;color:rgba(90,120,200,0.4);text-transform:uppercase}

/* Character dot */
.plan-cdot-wrap{position:absolute;left:0;top:0;width:0;height:0;pointer-events:none;z-index:20;will-change:transform}
.plan-cdot-circle{position:absolute;width:7px;height:7px;border-radius:50%;left:-3.5px;top:-3.5px}
.plan-cdot-circle::after{content:’’;position:absolute;inset:-3px;border-radius:50%;opacity:.25;animation:cpulse 2s ease-in-out infinite}
@keyframes cpulse{0%,100%{transform:scale(1);opacity:.2}50%{transform:scale(2.4);opacity:.5}}
.plan-cdot-label{position:absolute;left:50%;bottom:9px;transform:translateX(-50%);white-space:nowrap;font-size:7px;color:rgba(200,220,255,0.9);font-family:var(--sans);text-shadow:0 0 5px #000,0 1px 4px #000,0 0 10px rgba(0,0,30,0.9);pointer-events:none;line-height:1;letter-spacing:.03em;display:flex;align-items:center;gap:2px}
.mdot{display:inline-block;width:5px;height:5px;border-radius:50%;flex-shrink:0;box-shadow:0 0 3px currentColor}
.floor-label{font-family:var(--serif);font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-top:8px;text-align:center;opacity:.7}

/* FAB */
.fab{position:fixed;bottom:28px;right:max(18px,calc(50vw - 222px));width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#e8a85f,#c87a3a);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#180c02;box-shadow:0 4px 22px rgba(232,168,95,0.42);z-index:200;transition:transform .2s;font-size:25px;font-weight:200;padding-bottom:2px}
.fab:active{transform:scale(0.9)}

/* Overlay & Panels */
.overlay{position:fixed;inset:0;background:rgba(5,7,26,0.62);backdrop-filter:blur(3px);z-index:300;opacity:0;pointer-events:none;transition:opacity .28s}
.overlay.show{opacity:1;pointer-events:all}
.panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:480px;background:linear-gradient(to bottom,#0e1336,#0b1030);border-top:1px solid rgba(100,140,220,0.22);border-radius:20px 20px 0 0;z-index:400;transition:transform .36s cubic-bezier(.22,1,.36,1);max-height:82vh;overflow:hidden;display:flex;flex-direction:column}
.panel.show{transform:translateX(-50%) translateY(0)}
.panel-handle{width:34px;height:3px;background:rgba(100,140,220,0.22);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.panel-header{padding:13px 18px 11px;border-bottom:1px solid rgba(70,100,180,0.14);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.panel-header-left{flex:1;min-width:0}
.panel-title{font-family:var(--serif);font-size:17px;font-weight:300}
.panel-meta{font-size:11px;color:var(--dim)}
.panel-body{overflow-y:auto;flex:1;padding:8px 14px 30px;scrollbar-width:thin;scrollbar-color:rgba(70,100,180,0.15) transparent}

/* Room rename */
.room-rename-area{padding:10px 18px 6px;border-bottom:1px solid rgba(70,100,180,0.1);flex-shrink:0;display:none}
.room-rename-area.open{display:flex;gap:8px;align-items:center}
.room-rename-area .fi{flex:1;padding:8px 11px;font-size:14px}
.btn-rename-save{flex-shrink:0;padding:8px 14px;background:rgba(232,168,95,0.12);border:1px solid rgba(232,168,95,0.3);border-radius:8px;color:var(--accent);font-family:var(--sans);font-size:12px;cursor:pointer}
.btn-icon{background:none;border:1px solid rgba(70,100,180,0.2);border-radius:7px;color:var(--dim);font-size:13px;padding:4px 8px;cursor:pointer;flex-shrink:0;transition:all .2s;line-height:1}
.btn-icon:active{background:rgba(232,168,95,0.08);color:var(--accent);border-color:rgba(232,168,95,0.3)}

/* All-chars section header */
.section-sep{font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;padding:10px 10px 6px;border-bottom:1px solid rgba(70,100,180,0.1);margin-bottom:2px}

/* Char list items */
.char-item{display:flex;align-items:center;gap:11px;padding:10px 10px;border-radius:10px;cursor:pointer;transition:background .2s;border:1px solid transparent;margin-bottom:3px}
.char-item:active{background:rgba(232,168,95,0.06);border-color:rgba(232,168,95,0.14)}
.char-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;flex-shrink:0}
.char-info{flex:1;min-width:0}
.char-name{font-family:var(--serif);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.char-sub{font-size:11px;color:var(--dim);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.char-arr{color:var(--dim);font-size:18px;opacity:.5}
.mental-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 6px;border-radius:8px;border:1px solid}
.ptag{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--sans);border:1px solid;line-height:1.5}

/* Detail */
.detail-wrap{padding-bottom:20px}
.btn-back{background:none;border:none;color:var(--dim);font-family:var(--sans);font-size:13px;padding:4px 2px 10px;cursor:pointer;display:flex;align-items:center;gap:5px}
.detail-hero{text-align:center;padding:18px 10px 14px;border-bottom:1px solid rgba(70,100,180,0.14);margin-bottom:4px}
.detail-av{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:24px}
.detail-name{font-family:var(--serif);font-size:21px;font-weight:300;margin-bottom:4px}
.detail-loc{font-size:11px;color:var(--dim);letter-spacing:.1em;margin-bottom:6px}
.detail-tags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.detail-row{padding:12px 4px;border-bottom:1px solid rgba(80,110,200,0.07)}
.detail-row:last-of-type{border-bottom:none}
.detail-lbl{font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.detail-val{font-size:15px;line-height:1.7;white-space:pre-wrap}
.detail-actions{display:flex;gap:8px;margin-top:18px;justify-content:center}
.btn-edit{padding:8px 22px;background:rgba(100,140,220,0.1);border:1px solid rgba(100,140,220,0.28);border-radius:8px;color:rgba(160,190,255,0.7);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .2s}
.btn-del{padding:8px 22px;background:none;border:1px solid rgba(220,80,80,0.22);border-radius:8px;color:rgba(220,80,80,0.55);font-family:var(--sans);font-size:12px;cursor:pointer}
/* Bond */
.bond-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid rgba(180,160,255,0.45);background:rgba(150,120,255,0.1);color:rgba(200,185,255,0.85);font-family:var(--sans)}
.bond-row{padding:13px 4px;border-bottom:1px solid rgba(80,110,200,0.07);display:flex;align-items:center;justify-content:space-between;gap:10px}
.bond-row-left{flex:1}
.btn-bond-off{padding:5px 12px;background:none;border:1px solid rgba(150,120,255,0.3);border-radius:7px;color:rgba(170,150,255,0.6);font-family:var(--sans);font-size:11px;cursor:pointer;flex-shrink:0;white-space:nowrap}
.btn-bond-off:active{background:rgba(150,120,255,0.1)}
/* Bond SVG lines */
.plan-bond-svg{position:absolute;left:0;top:0;pointer-events:none;z-index:18;overflow:visible}
.plan-bond-line{stroke-dasharray:4 3;animation:bond-dash 1.5s linear infinite;fill:none}
@keyframes bond-dash{to{stroke-dashoffset:-14}}
.empty-st{text-align:center;padding:32px 20px}
.empty-ic{font-size:26px;opacity:.2;margin-bottom:8px}
.empty-tx{font-family:var(--serif);font-size:13px;color:var(--dim);line-height:2}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(5,7,26,0.68);backdrop-filter:blur(4px);z-index:490;opacity:0;pointer-events:none;transition:opacity .28s}
.modal-ov.show{opacity:1;pointer-events:all}
.modal{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:480px;background:linear-gradient(to bottom,#0e1336,#0b1030);border-top:1px solid rgba(100,140,220,0.28);border-radius:20px 20px 0 0;z-index:500;transition:transform .36s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow-y:auto;padding:10px 18px 50px;scrollbar-width:thin;scrollbar-color:rgba(70,100,180,0.15) transparent}
.modal.show{transform:translateX(-50%) translateY(0)}
.modal-handle{width:34px;height:3px;background:rgba(100,140,220,0.22);border-radius:2px;margin:0 auto 14px}
.modal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-family:var(--serif);font-size:18px;font-weight:300;letter-spacing:.06em}
.btn-modal-close{background:none;border:1px solid rgba(70,100,180,0.22);border-radius:50%;width:28px;height:28px;color:var(--dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;line-height:1}
.btn-modal-close:active{background:rgba(80,110,200,0.12);color:var(--text)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
.fi,.fs,.ft{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(70,100,180,0.22);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
.fi::placeholder,.ft::placeholder{color:var(--dim);opacity:.7}
.fi:focus,.fs:focus,.ft:focus{border-color:rgba(232,168,95,0.42);box-shadow:0 0 0 3px rgba(232,168,95,0.06)}
.fs option{background:#0e1336;color:var(--text)}
.ft{resize:none;height:76px;line-height:1.6}
.ptag-radios{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ptag-radio{display:flex;align-items:center;gap:7px;padding:9px 12px;border-radius:10px;border:1px solid rgba(70,100,180,0.2);cursor:pointer;transition:all .18s}
.ptag-radio.sel{border-color:currentColor;background:rgba(255,255,255,0.04)}
.ptag-radio input{display:none}
.ptag-radio-label{font-size:12px;line-height:1.3}
.ptag-radio-desc{font-size:9px;color:var(--dim);line-height:1.4}
.swatches{display:flex;gap:7px;flex-wrap:wrap}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;position:relative}
.swatch.sel{border-color:rgba(255,255,255,0.7);transform:scale(1.18)}
.swatch.sel::after{content:‘✓’;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.9)}
.swatch:active{transform:scale(0.9) !important}
.btn-sub{width:100%;margin-top:6px;padding:13px;background:linear-gradient(135deg,rgba(232,168,95,.92),rgba(200,122,50,.92));border:none;border-radius:12px;color:#180c02;font-family:var(--serif);font-size:15px;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:opacity .2s,transform .15s}
.btn-sub:active{opacity:.85;transform:scale(.99)}

@keyframes fadeSlide{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.floor-anim{animation:fadeSlide .26s ease}

/* ── Whale ── */
.plan-whale-wrap{position:absolute;left:0;top:0;width:0;height:0;pointer-events:none;z-index:25;will-change:transform;transition:opacity 0.8s}
.plan-whale{position:absolute;width:28px;height:28px;border-radius:50%;background:radial-gradient(circle,#ff6655 0%,#cc2211 55%,#880000 100%);box-shadow:0 0 18px rgba(255,80,60,0.75),0 0 40px rgba(255,40,40,0.35),0 0 70px rgba(200,20,20,0.15);left:-14px;top:-14px;animation:whale-bob 3.5s ease-in-out infinite}
.plan-whale-aura{position:absolute;width:100px;height:60px;border-radius:50%;left:-50px;top:-30px;background:radial-gradient(ellipse,rgba(200,40,30,0.1) 0%,rgba(200,40,30,0.05) 50%,transparent 75%);animation:whale-aura 2.8s ease-in-out infinite;pointer-events:none}
.plan-whale-noise{position:absolute;width:130px;height:80px;border-radius:50%;left:-65px;top:-40px;pointer-events:none;background:radial-gradient(ellipse,rgba(255,60,50,0.18) 0%,rgba(255,60,50,0.06) 45%,transparent 70%);animation:whale-noise 0.1s steps(1) infinite}
@keyframes whale-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
@keyframes whale-aura{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.18);opacity:1}}
@keyframes whale-noise{
0%  {transform:translate(0px,0px)  scale(1)   ;opacity:0.12}
10% {transform:translate(1px,-1px) scale(1.03);opacity:0.21}
20% {transform:translate(-1px,1px) scale(0.97);opacity:0.09}
30% {transform:translate(1px,1px)  scale(1.02);opacity:0.19}
40% {transform:translate(-2px,0px) scale(0.98);opacity:0.07}
50% {transform:translate(0px,1px)  scale(1.04);opacity:0.23}
60% {transform:translate(2px,-1px) scale(0.96);opacity:0.11}
70% {transform:translate(-1px,1px) scale(1.01);opacity:0.18}
80% {transform:translate(0px,-1px) scale(1.03);opacity:0.15}
90% {transform:translate(1px,0px)  scale(0.97);opacity:0.08}
100%{transform:translate(0px,0px)  scale(1)   ;opacity:0.12}
}
</style>

</head>
<body>
<canvas class="stars-canvas" id="starsCanvas"></canvas>
<div class="app">
  <header>
    <div><div class="h-title">Scholarium</div><div class="h-sub">創作キャラクターマップ</div></div>
    <div class="h-count" id="hCount"><span>0</span>人</div>
  </header>
  <div class="floor-tabs" id="floorTabs"></div>
  <div class="map-area" id="mapArea"></div>
</div>
<button class="fab" id="fabBtn">＋</button>
<div class="overlay" id="overlay"></div>

<!-- Room panel -->

<div class="panel" id="roomPanel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div class="panel-header-left">
      <div class="panel-title" id="rPTitle"></div>
      <div class="panel-meta" id="rPMeta"></div>
    </div>
    <button class="btn-icon" id="renameBtn" onclick="toggleRoomRename()" title="部屋名を変更">✎</button>
  </div>
  <div class="room-rename-area" id="rPRenameArea">
    <input class="fi" id="rPRenameInput" type="text" placeholder="新しい部屋名...">
    <button class="btn-rename-save" onclick="saveRoomRename()">保存</button>
  </div>
  <div class="panel-body" id="rPBody"></div>
</div>

<!-- Char detail panel -->

<div class="panel" id="charPanel">
  <div class="panel-handle"></div>
  <div class="panel-body" id="cPBody"></div>
</div>

<!-- Add/Edit modal -->

<div class="modal-ov" id="modalOv"></div>
<div class="modal" id="addModal">

const FLOOR_ORDER=['b1','1f','2f','3f','4f','5f'];

// ── Whale ──
const WHALE_FLOORS=['b1','1f','2f','3f','4f','5f'];
const WHALE_SPEED=1, WHALE_STAIR_DUR=20000, WHALE_LEFT_X=10, WHALE_RIGHT_X=290;
const WHALE_CONTACT=24, WHALE_DAMAGE_INTERVAL=20000;
let whale={floorIdx:0,x:WHALE_LEFT_X,dir:1,phase:'swim',stairTimer:0,ascending:true,cooldowns:{}};

/* ============================================================
   STATE
============================================================ */
let ST={chars:[],floor:'1f',roomNames:{},bonds:[]};
let selColor=COLORS[0], selPersonality='', editCharId=null, currentRoomCtx=null;
let mentalDirty=false;

function loadData(){
  try{const s=localStorage.getItem('scholarium_v5');if(s){const p=JSON.parse(s);ST.chars=p.chars||[];ST.roomNames=p.roomNames||{};ST.bonds=p.bonds||[];}}catch(e){}
  ST.chars.forEach(c=>{ if(!c.mental) c.mental='normal'; });
}
function saveData(){
  try{localStorage.setItem('scholarium_v5',JSON.stringify({chars:ST.chars,roomNames:ST.roomNames,bonds:ST.bonds}));}catch(e){}
  mentalDirty=false;
}
function getRoomName(fid,rid){
  const k=fid+':'+rid;
  if(ST.roomNames[k]) return ST.roomNames[k];
  const r=FLOOR_PLANS[fid].rooms.find(r=>r.id===rid);
  return r?r.name.replace(/\n/g,''):rid;
}

/* ============================================================
   STARS
============================================================ */
function initStars(){
  const c=document.getElementById('starsCanvas'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const stars=Array.from({length:70},()=>({x:Math.random()*c.width,y:Math.random()*c.height*.45,r:Math.random()*1.1+.2,a:Math.random(),s:Math.random()*.005+.002,d:Math.random()>.5?1:-1}));
  function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.a+=s.s*s.d;if(s.a>1||s.a<.1)s.d*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,200,255,${s.a*.55})`;ctx.fill();});requestAnimationFrame(draw);}
  draw();
}

/* ============================================================
   FLOOR PLAN BUILD
============================================================ */
let planScale=1;
function calcScale(){planScale=(document.getElementById('mapArea').clientWidth-24)/PW;return planScale;}

function buildFloorPlan(fid){
  const fp=FLOOR_PLANS[fid];
  const chars=ST.chars.filter(c=>c.floor===fid);
  const sc=calcScale();
  const mapEl=document.getElementById('mapArea');
  mapEl.innerHTML='';

  const wrap=mk('div','plan-wrap floor-anim');
  wrap.style.height=PH*sc+'px';wrap.style.marginBottom='8px';
  const inner=mk('div','plan-inner');
  inner.id='planInner';
  inner.style.cssText=`width:${PW}px;height:${PH}px;transform:scale(${sc})`;

  inner.appendChild(mk('div','plan-bg'));

  // Corridor
  const corr=mk('div','plan-corr');pos(corr,2,CY,PW-4,CH);inner.appendChild(corr);
  const cl=mk('div','plan-corr-light');cl.style.cssText=`position:absolute;left:2px;top:${CCY}px;width:${PW-4}px`;inner.appendChild(cl);
  const clbl=mk('div','plan-corr-label');clbl.textContent='廊 下';clbl.style.cssText=`left:${PW/2-14}px;top:${CY+6}px`;inner.appendChild(clbl);

  // Right staircase
  const rs=mk('div','plan-stairs');pos(rs,SX,2,SW,PH-4);rs.innerHTML=`<span class="plan-stairs-text">階段</span><span class="plan-stairs-text">EV</span>`;inner.appendChild(rs);

  // Left emergency stairs (1F-4F only)
  if(HAS_LEFT_STAIRS.includes(fid)){
    const ls=mk('div','plan-stairs left-stairs');
    pos(ls,0,0,10,PH);
    ls.innerHTML=`<span class="plan-stairs-text">非常</span><span class="plan-stairs-text">階段</span>`;
    inner.appendChild(ls);
  }

  // Windows
  if(fp.windows){
    fp.windows.top.forEach(w=>{const ww=mk('div','plan-window');ww.style.cssText=`position:absolute;left:${w.x}px;top:0;width:18px;height:3px;background:rgba(255,200,80,0.14);border-bottom:1px solid rgba(255,200,80,0.25)`;inner.appendChild(ww);});
    fp.windows.bot.forEach(w=>{const ww=mk('div','plan-window');ww.style.cssText=`position:absolute;left:${w.x}px;top:${PH-3}px;width:18px;height:3px;background:rgba(255,200,80,0.14);border-top:1px solid rgba(255,200,80,0.25)`;inner.appendChild(ww);});
  }

  // Rooms
  fp.rooms.forEach(room=>{
    const occupied=chars.filter(c=>c.room===room.id);
    const isRestricted=MOVE_RESTRICTED.includes(room.id);
    const isStaff=room.id===STAFF_ID;
    const isLocker=ASSIGN_RESTRICTED.includes(room.id);
    const isTop=room.y<CY;

    const rdiv=mk('div','plan-room');
    if(room.large) rdiv.classList.add('wide');
    if(occupied.length>0&&!isLocker) rdiv.classList.add('occ');
    rdiv.classList.add(isTop?'top-room':'bot-room');
    if(isLocker) rdiv.classList.add('restricted');
    if(isStaff) rdiv.classList.add('staff-room');
    pos(rdiv,room.x,room.y,room.w,room.h);
    if(room.large) rdiv.style.background='#080b1e';

    // Door gap
    const dW=Math.min(16,room.w*0.4),dX=room.w/2-dW/2;
    const door=mk('div','plan-door');
    door.style.cssText=`position:absolute;left:${dX}px;${isTop?'bottom:-1px':'top:-1px'};width:${dW}px;height:2px`;
    if(!isRestricted) rdiv.appendChild(door);

    // Icon for special rooms
    if(isLocker){const ic=mk('div','plan-room-icon');ic.textContent='🔒';rdiv.appendChild(ic);}
    else if(isStaff){const ic=mk('div','plan-room-icon');ic.textContent='📋';rdiv.appendChild(ic);}

    const ns=mk('div','plan-room-name');
    ns.innerHTML=getRoomName(fid,room.id).replace(/\n/g,'<br>');
    rdiv.appendChild(ns);
    rdiv.appendChild(mk('div','plan-room-dot'));

    if(occupied.length>0&&!isLocker){
      const badge=mk('div','plan-room-badge');badge.textContent=`×${occupied.length}`;rdiv.appendChild(badge);
    }

    if(isLocker){
      // No click → no-op
    } else if(isStaff){
      rdiv.addEventListener('click',()=>openStaffRoom(fid));
    } else {
      rdiv.addEventListener('click',()=>openRoom(fid,room.id));
    }
    inner.appendChild(rdiv);
  });

  wrap.appendChild(inner);mapEl.appendChild(wrap);
  const flbl=mk('div','floor-label');flbl.textContent=fp.name;mapEl.appendChild(flbl);
  spawnCharDots(fid,inner);
}

function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function pos(el,x,y,w,h){el.style.cssText+=`position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;}

/* ============================================================
   ANIMATION & MOVEMENT
============================================================ */
let dotStates={};
let animRafs={},lastTs={};
const SPEED_ROOM=5,SPEED_CORR=55,SPEED_DOOR=35;
const IDLE_MIN=8000,IDLE_MAX=22000;
let saveAccum=0;

function getIdleTime(p,mental){
  let base=IDLE_MIN+Math.random()*(IDLE_MAX-IDLE_MIN);
  let mult=1;
  if(p==='calm')     mult=mental==='good'?4.5:mental==='bad'?2.0:3.2;
  if(p==='energetic')mult=mental==='good'?0.12:mental==='bad'?0.5:0.22;
  if(p==='loner')    mult=mental==='good'?0.7:mental==='bad'?1.5:1.0;
  if(p==='social')   mult=mental==='good'?0.7:mental==='bad'?1.5:1.0;
  return base*mult;
}

function getPersonalityStrength(p,mental){
  if(!p) return 0;
  if(mental==='good')  return 0.85;
  if(mental==='bad')   return 0.25;
  return 0.60;
}

function roomCenter(r){return{x:r.x+r.w/2,y:r.y+r.h/2};}
function doorY(r){return r.y<CY?CY:CY+CH;}
function doorX(r){return r.x+r.w/2;}

function getMovableRooms(fid){
  return FLOOR_PLANS[fid].rooms.filter(r=>!MOVE_RESTRICTED.includes(r.id));
}

function initDotState(char){
  const fp=FLOOR_PLANS[char.floor]; if(!fp)return;
  let room=fp.rooms.find(r=>r.id===char.room);
  if(!room||MOVE_RESTRICTED.includes(char.room)){
    const movable=getMovableRooms(char.floor);
    room=movable[0]||fp.rooms[0];
  }
  const c=roomCenter(room);
  dotStates[char.id]={
    x:c.x,y:c.y,phase:'idle',
    idleTimer:getIdleTime(char.personality||'',char.mental||'normal'),
    driftTimer:0,driftTX:c.x,driftTY:c.y,
    currentRoom:room,targetRoom:null,targetX:c.x,targetY:c.y,
    justMoved:false,
    mentalNatTimer:80000+Math.random()*100000,
    classmateTimer:0,crowdTimer:0,socialAloneTimer:0,
    calmStayTimer:0,energyStayTimer:0,mentalTick:0,
    togetherTimer:{},
    separationTimer:0,
  };
}

/* ── Bond helpers ── */
const BOND_THRESHOLD=15000;

function getBondObj(charId){return ST.bonds.find(b=>b.a===charId||b.b===charId)||null;}
function getBondPartner(charId){
  const b=getBondObj(charId);if(!b)return null;
  const pid=b.a===charId?b.b:b.a;return ST.chars.find(c=>c.id===pid)||null;
}
function hasBond(charId){return ST.bonds.some(b=>b.a===charId||b.b===charId);}
function removeCharBond(charId){
  ST.bonds=ST.bonds.filter(b=>b.a!==charId&&b.b!==charId);
  mentalDirty=true;saveData();
}
function tryFormBond(idA,idB){
  if(hasBond(idA)||hasBond(idB))return;
  ST.bonds.push({a:idA,b:idB,age:0});
  mentalDirty=true;saveData();
}
// 関連性の強さ 0〜1（最大5分で満タン）
function bondStrength(charId){
  const b=getBondObj(charId);if(!b)return 0;
  return Math.min(1,(b.age||0)/300000);
}

function initWhale(){
  whale.floorIdx=0;whale.x=WHALE_LEFT_X;whale.dir=1;
  whale.phase='swim';whale.stairTimer=0;whale.ascending=true;whale.cooldowns={};
}

function stepWhale(dt){
  if(whale.phase==='stair'){
    whale.stairTimer-=dt;
    if(whale.stairTimer<=0){
      const step=whale.ascending?1:-1;
      whale.floorIdx+=step;
      if(whale.floorIdx>=WHALE_FLOORS.length){whale.floorIdx=WHALE_FLOORS.length-2;whale.ascending=false;}
      else if(whale.floorIdx<0){whale.floorIdx=1;whale.ascending=true;}
      whale.phase='swim';whale.stairTimer=0;
      updateWhaleDot();
    }
    return;
  }
  whale.x+=WHALE_SPEED*whale.dir*(dt/10000);
  const fid=WHALE_FLOORS[whale.floorIdx];
  const hasLS=HAS_LEFT_STAIRS.includes(fid);
  if(whale.dir===1&&whale.x>=WHALE_RIGHT_X){
    whale.x=WHALE_RIGHT_X;whale.phase='stair';whale.stairTimer=WHALE_STAIR_DUR;whale.dir=-1;
  } else if(whale.dir===-1&&whale.x<=WHALE_LEFT_X){
    if(hasLS){whale.x=WHALE_LEFT_X;whale.phase='stair';whale.stairTimer=WHALE_STAIR_DUR;whale.dir=1;}
    else{whale.x=WHALE_LEFT_X;whale.dir=1;}
  }
  const now=Date.now();
  ST.chars.filter(c=>c.floor===fid&&dotStates[c.id]).forEach(char=>{
    const ds=dotStates[char.id];
    const dx=ds.x-whale.x,dy=ds.y-CCY;
    if(Math.sqrt(dx*dx+dy*dy)<WHALE_CONTACT){
      const last=whale.cooldowns[char.id]||0;
      if(now-last>WHALE_DAMAGE_INTERVAL){
        whale.cooldowns[char.id]=now;
        if(tryMentalChange(char,-1)) onMentalChange(char);
      }
    }
  });
}

function updateWhaleDot(){
  const wEl=document.getElementById('whaleWrap');if(!wEl)return;
  const vis=whale.phase==='swim'&&WHALE_FLOORS[whale.floorIdx]===ST.floor;
  wEl.style.opacity=vis?'1':'0';
}

function pickTargetRoom(fp,ds,char,fid){
  const movable=getMovableRooms(fid).filter(r=>r.id!==ds.currentRoom.id);
  if(!movable.length) return ds.currentRoom;
  const p=char.personality||'';
  const mental=char.mental||'normal';
  const strength=getPersonalityStrength(p,mental);
  const bs=bondStrength(char.id);

  const partner=getBondPartner(char.id);
  const pds=partner?dotStates[partner.id]:null;
  const partnerSameFloor=partner&&partner.floor===fid;
  const partnerSameRoom=pds&&ds.currentRoom&&pds.currentRoom&&pds.currentRoom.id===ds.currentRoom.id;

  // 一緒にいるとき → 2人で誰もいない部屋へ（bondStrength依存）
  if(partnerSameFloor&&partnerSameRoom&&Math.random()<0.55+bs*0.35){
    const emptyForBoth=movable.filter(r=>!ST.chars.some(c=>
      c.id!==char.id&&c.id!==partner.id&&dotStates[c.id]&&dotStates[c.id].currentRoom&&dotStates[c.id].currentRoom.id===r.id
    ));
    if(emptyForBoth.length){
      const dest=emptyForBoth[Math.floor(Math.random()*emptyForBoth.length)];
      // パートナーにも同じ目的地をセット
      if(pds&&pds.phase==='idle'){
        pds.phase='to_door';pds.targetRoom=dest;
        pds.targetX=doorX(pds.currentRoom);pds.targetY=doorY(pds.currentRoom);
      }
      return dest;
    }
  }

  // 離れているとき → パートナーのいる部屋へ（bondStrength依存）
  if(partnerSameFloor&&!partnerSameRoom&&Math.random()<0.50+bs*0.35){
    if(pds&&pds.currentRoom&&pds.currentRoom.id!==ds.currentRoom.id){
      const pr=movable.find(r=>r.id===pds.currentRoom.id);if(pr) return pr;
    }
  }

  if(p&&Math.random()<strength){
    if(p==='loner'){
      const empty=movable.filter(r=>!ST.chars.some(c=>c.id!==char.id&&c.floor===fid&&dotStates[c.id]&&dotStates[c.id].currentRoom&&dotStates[c.id].currentRoom.id===r.id));
      if(empty.length) return empty[Math.floor(Math.random()*empty.length)];
    } else if(p==='social'){
      const pop=movable.filter(r=>ST.chars.some(c=>c.id!==char.id&&c.floor===fid&&dotStates[c.id]&&dotStates[c.id].currentRoom&&dotStates[c.id].currentRoom.id===r.id));
      if(pop.length) return pop[Math.floor(Math.random()*pop.length)];
    }
  }
  return movable[Math.floor(Math.random()*movable.length)];
}

/* ── Mental state processing (called once per second) ── */
function tryMentalChange(char,dir){
  // dir +1 = improve (bad→normal or normal→good), -1 = worsen
  const m=char.mental||'normal';
  if(dir>0){
    if(m==='bad'){char.mental='normal';return true;}
    if(m==='normal'){char.mental='good';return true;}
  } else {
    if(m==='good'){char.mental='normal';return true;}
    if(m==='normal'){char.mental='bad';return true;}
  }
  return false;
}

function processMentalTick(id,ds,char,fid){
  if(!char.mental) char.mental='normal';
  const fp=FLOOR_PLANS[fid];
  const p=char.personality||'';
  const m=char.mental;

  // Chars in same physical room right now
  const sameRoom=ST.chars.filter(c=>
    c.id!==char.id&&c.floor===fid&&dotStates[c.id]&&dotStates[c.id].currentRoom&&ds.currentRoom&&
    dotStates[c.id].currentRoom.id===ds.currentRoom.id
  );
  // Classmates = same homeroom assignment
  const classmates=sameRoom.filter(c=>c.room===char.room);

  // ── Natural drift toward normal (every ~2min, 25% chance) ──
  ds.mentalNatTimer-=1000;
  if(ds.mentalNatTimer<=0){
    ds.mentalNatTimer=80000+Math.random()*100000;
    if(m!=='normal'&&Math.random()<0.25){
      tryMentalChange(char,m==='bad'?1:-1);
      onMentalChange(char);
    }
  }

  // ── Classmate boost (every 20s, 35% chance per tick in presence) ──
  if(classmates.length>0&&ds.phase==='idle'){
    ds.classmateTimer+=1000;
    const thresh=m==='bad'?15000:m==='good'?30000:20000;
    if(ds.classmateTimer>=thresh&&Math.random()<0.35){
      ds.classmateTimer=0;
      if(m!=='good'){if(tryMentalChange(char,1)) onMentalChange(char);}
    }
  } else {
    ds.classmateTimer=Math.max(0,ds.classmateTimer-500);
  }

  // ── Personality-specific ──
  switch(p){
    case 'loner':{
      const nonClass=sameRoom.filter(c=>c.room!==char.room);
      const allClassmates=sameRoom.length>0&&nonClass.length===0;
      if(sameRoom.length>=3&&!allClassmates){
        ds.crowdTimer+=1000;
        const thresh=m==='good'?12000:m==='bad'?28000:18000;
        if(ds.crowdTimer>=thresh&&Math.random()<0.4){
          ds.crowdTimer=0;if(tryMentalChange(char,-1)) onMentalChange(char);
        }
      } else { ds.crowdTimer=Math.max(0,ds.crowdTimer-300); }
      break;
    }
    case 'social':{
      if(sameRoom.length===0&&ds.phase==='idle'){
        ds.socialAloneTimer+=1000;
        const thresh=m==='good'?8000:m==='bad'?22000:13000;
        if(ds.socialAloneTimer>=thresh&&Math.random()<0.35){
          ds.socialAloneTimer=0;if(tryMentalChange(char,-1)) onMentalChange(char);
        }
      } else { ds.socialAloneTimer=Math.max(0,ds.socialAloneTimer-300); }
      break;
    }
    case 'calm':{
      if(ds.justMoved){
        ds.justMoved=false;
        if(Math.random()<0.5){if(tryMentalChange(char,-1)) onMentalChange(char);}
      }
      if(ds.phase==='idle'){
        ds.calmStayTimer+=1000;
        const thresh=m==='good'?14000:m==='bad'?42000:28000;
        if(ds.calmStayTimer>=thresh&&Math.random()<0.32){
          ds.calmStayTimer=0;if(tryMentalChange(char,1)) onMentalChange(char);
        }
      } else { ds.calmStayTimer=0; }
      break;
    }
    case 'energetic':{
      if(ds.phase!=='idle'){ ds.energyStayTimer=0; }
      else {
        ds.energyStayTimer+=1000;
        const thresh=m==='good'?20000:m==='bad'?50000:34000;
        if(ds.energyStayTimer>=thresh&&Math.random()<0.2){
          ds.energyStayTimer=0;if(tryMentalChange(char,-1)) onMentalChange(char);
        }
      }
      break;
    }
    default:{
      // No personality: rare random shifts
      break;
    }
  }

  // Sync save flag
  if(mentalDirty) saveAccum+=1000;

  // ── Bond: togetherness tracking ──
  if(!hasBond(char.id)&&ds.currentRoom&&ds.phase==='idle'){
    const roomAll=ST.chars.filter(c=>c.id!==char.id&&c.floor===fid&&dotStates[c.id]&&dotStates[c.id].currentRoom&&dotStates[c.id].currentRoom.id===ds.currentRoom.id);
    if(roomAll.length===1){
      const cand=roomAll[0];
      if(cand.room===char.room&&!hasBond(cand.id)){
        ds.togetherTimer[cand.id]=(ds.togetherTimer[cand.id]||0)+1000;
        if(ds.togetherTimer[cand.id]>=BOND_THRESHOLD){tryFormBond(char.id,cand.id);ds.togetherTimer={};}
      } else {ds.togetherTimer={};}
    } else {ds.togetherTimer={};}
  } else if(!hasBond(char.id)){ds.togetherTimer={};}

  // ── Bond: effects ──
  const partner=getBondPartner(char.id);
  const bs=bondStrength(char.id);
  if(partner){
    const pds=dotStates[partner.id];
    const sameFloor=partner.floor===fid;
    const sameRm=pds&&ds.currentRoom&&pds.currentRoom&&pds.currentRoom.id===ds.currentRoom.id;

    if(sameRm){
      // 一緒にいるとき: メンタル悪化ほぼなし、相手に引っ張られる
      ds.separationTimer=0;
      if(Math.random()<0.008*Math.max(0.3,bs)){
        const pm=partner.mental||'normal';const cm=char.mental||'normal';
        if(pm==='good'&&cm!=='good'){if(tryMentalChange(char,1)) onMentalChange(char);}
        if(pm==='bad' &&cm!=='bad') {if(tryMentalChange(char,-1)) onMentalChange(char);}
      }
    } else {
      // 離れているとき: メンタル引力 + 悪化（bondStrength依存）
      ds.separationTimer+=1000;
      if(ds.separationTimer>=10000){
        ds.separationTimer=0;
        if(Math.random()<0.30+bs*0.25){
          const pm=partner.mental||'normal';const cm=char.mental||'normal';
          if(pm==='good'&&cm!=='good'){if(tryMentalChange(char,1)) onMentalChange(char);}
          if(pm==='bad' &&cm!=='bad') {if(tryMentalChange(char,-1)) onMentalChange(char);}
        }
      }
      // 同フロアで離れていると悪化（bondStrengthで徐々に強く）
      if(sameFloor&&ds.phase==='idle'){
        const sepChance=0.020+bs*0.025;
        if(Math.random()<sepChance){if(tryMentalChange(char,-1)) onMentalChange(char);}
      }
      // 別フロアは頻度低め（このバージョンでは階移動なし）
    }
  } else {ds.separationTimer=0;}
}

function onMentalChange(char){
  mentalDirty=true;
  // Update idle timer with new mental
  const ds=dotStates[char.id];
  if(ds&&ds.phase==='idle'){
    ds.idleTimer=Math.min(ds.idleTimer, getIdleTime(char.personality||'',char.mental));
  }
  // Update dot label
  refreshDotLabel(char);
}

function refreshDotLabel(char){
  const dotEl=document.getElementById('dot_'+char.id);
  if(!dotEl) return;
  const lbl=dotEl.querySelector('.plan-cdot-label');
  if(!lbl) return;
  const mc=MENTAL[char.mental||'normal'].color;
  lbl.innerHTML=`<span class="mdot" style="background:${mc};box-shadow:0 0 4px ${mc}"></span>${esc(char.name)}`;
}

/* ── Main step function ── */
function stepDot(id,ds,char,fid,dt){
  const fp=FLOOR_PLANS[fid]; if(!fp)return;

  // Mental tick (once per second)
  ds.mentalTick+=dt;
  if(ds.mentalTick>=1000){
    ds.mentalTick-=1000;
    processMentalTick(id,ds,char,fid);
  }

  switch(ds.phase){
    case 'idle':{
      ds.driftTimer-=dt;
      if(ds.driftTimer<=0){
        ds.driftTimer=1200+Math.random()*2000;
        const r=ds.currentRoom;
        ds.driftTX=r.x+5+Math.random()*(r.w-10);
        ds.driftTY=r.y+5+Math.random()*(r.h-10);
      }
      moveTo(ds,ds.driftTX,ds.driftTY,SPEED_ROOM*dt/1000);
      ds.idleTimer-=dt;
      if(ds.idleTimer<=0){
        const movable=getMovableRooms(fid).filter(r=>r.id!==ds.currentRoom.id);
        // クジラが同じフロアの廊下を泳いでいる場合、外出を控える
        const whaleHere=whale.phase==='swim'&&WHALE_FLOORS[whale.floorIdx]===fid;
        const goChance=whaleHere?0.22:1.0;
        if(movable.length>0&&Math.random()<goChance){
          ds.phase='to_door';
          ds.targetX=doorX(ds.currentRoom);ds.targetY=doorY(ds.currentRoom);
          if((char.personality||'')==='calm') ds.justMoved=true;
        } else {
          ds.idleTimer=getIdleTime(char.personality||'',char.mental||'normal')*(whaleHere?0.35:1);
        }
      }
      break;
    }
    case 'to_door':{
      if(moveTo(ds,ds.targetX,ds.targetY,SPEED_DOOR*dt/1000)){ds.phase='to_corr';ds.targetY=CCY;}
      break;
    }
    case 'to_corr':{
      if(moveTo(ds,ds.targetX,CCY,SPEED_DOOR*dt/1000)){
        ds.targetRoom=pickTargetRoom(fp,ds,char,fid);
        ds.targetX=doorX(ds.targetRoom);ds.phase='corridor';
      }
      break;
    }
    case 'corridor':{
      if(moveTo(ds,ds.targetX,CCY,SPEED_CORR*dt/1000)){
        ds.phase='to_room_door';ds.targetY=doorY(ds.targetRoom);
      }
      break;
    }
    case 'to_room_door':{
      if(moveTo(ds,ds.targetX,ds.targetY,SPEED_DOOR*dt/1000)){
        ds.phase='to_room_center';const c=roomCenter(ds.targetRoom);ds.targetX=c.x;ds.targetY=c.y;
      }
      break;
    }
    case 'to_room_center':{
      if(moveTo(ds,ds.targetX,ds.targetY,SPEED_DOOR*dt/1000)){
        ds.currentRoom=ds.targetRoom;ds.targetRoom=null;ds.phase='idle';
        ds.idleTimer=getIdleTime(char.personality||'',char.mental||'normal');
        ds.driftTimer=0;
      }
      break;
    }
  }
}

function moveTo(ds,tx,ty,md){
  const dx=tx-ds.x,dy=ty-ds.y,d=Math.sqrt(dx*dx+dy*dy);
  if(d<=md||d<0.3){ds.x=tx;ds.y=ty;return true;}
  ds.x+=(dx/d)*md;ds.y+=(dy/d)*md;return false;
}

function spawnCharDots(fid,container){
  container.querySelectorAll('.plan-cdot-wrap,.plan-bond-svg').forEach(d=>d.remove());
  ST.chars.filter(c=>c.floor===fid).forEach(char=>{
    if(!dotStates[char.id]) initDotState(char);
    const wrap=mk('div','plan-cdot-wrap');
    wrap.id='dot_'+char.id;
    const circle=mk('div','plan-cdot-circle');
    circle.style.background=char.color;
    circle.style.boxShadow=`0 0 8px ${char.color},0 0 16px ${char.color}44`;
    const st2=document.createElement('style');
    st2.textContent=`#dot_${char.id} .plan-cdot-circle::after{background:${char.color}}`;
    document.head.appendChild(st2);
    const lbl=mk('div','plan-cdot-label');
    const mc=MENTAL[char.mental||'normal'].color;
    lbl.innerHTML=`<span class="mdot" style="background:${mc};box-shadow:0 0 4px ${mc}"></span>${esc(char.name)}`;
    wrap.appendChild(circle);wrap.appendChild(lbl);
    container.appendChild(wrap);
    const ds=dotStates[char.id];
    wrap.style.transform=`translate(${ds.x}px,${ds.y}px)`;
  });
  // Bond SVG lines
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.className.baseVal='plan-bond-svg';
  svg.style.cssText=`position:absolute;left:0;top:0;width:${PW}px;height:${PH}px;overflow:visible;pointer-events:none;z-index:18`;
  svg.id='bondSvg';
  container.appendChild(svg);
  drawBondLines(fid);
  // クジラ
  const wWrap=mk('div','plan-whale-wrap');
  wWrap.id='whaleWrap';
  wWrap.appendChild(mk('div','plan-whale-noise'));
  wWrap.appendChild(mk('div','plan-whale-aura'));
  wWrap.appendChild(mk('div','plan-whale'));
  container.appendChild(wWrap);
  const whaleVisible=whale.phase==='swim'&&WHALE_FLOORS[whale.floorIdx]===fid;
  wWrap.style.opacity=whaleVisible?'1':'0';
  wWrap.style.transform=`translate(${whale.x}px,${CCY}px)`;
  startAnim(fid);
}

function drawBondLines(fid){
  const svg=document.getElementById('bondSvg');if(!svg)return;
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  ST.bonds.forEach(bond=>{
    const cA=ST.chars.find(c=>c.id===bond.a);
    const cB=ST.chars.find(c=>c.id===bond.b);
    if(!cA||!cB||cA.floor!==fid||cB.floor!==fid)return;
    const dsA=dotStates[cA.id],dsB=dotStates[cB.id];
    if(!dsA||!dsB)return;
    const bs=Math.min(1,(bond.age||0)/300000);
    const op=0.25+bs*0.5;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('class','plan-bond-line');
    line.setAttribute('stroke',`rgba(255,255,255,${op})`);
    line.setAttribute('stroke-width','1');
    line.setAttribute('x1',dsA.x);line.setAttribute('y1',dsA.y);
    line.setAttribute('x2',dsB.x);line.setAttribute('y2',dsB.y);
    svg.appendChild(line);
  });
}

function startAnim(fid){
  if(animRafs[fid]){cancelAnimationFrame(animRafs[fid]);animRafs[fid]=null;}
  lastTs[fid]=null;saveAccum=0;
  const chars=ST.chars.filter(c=>c.floor===fid);
  function loop(ts){
    if(!lastTs[fid])lastTs[fid]=ts;
    const dt=Math.min(ts-lastTs[fid],100);lastTs[fid]=ts;
    const container=document.getElementById('planInner');
    if(!container){animRafs[fid]=null;return;}
    chars.forEach(char=>{
      const ds=dotStates[char.id];if(!ds)return;
      stepDot(char.id,ds,char,fid,dt);
      if(fid===ST.floor){
        const dotEl=document.getElementById('dot_'+char.id);
        if(dotEl) dotEl.style.transform=`translate(${ds.x}px,${ds.y}px)`;
      }
    });
    // Bond updates
    ST.bonds.forEach(b=>{b.age=(b.age||0)+dt;});
    if(fid===ST.floor) drawBondLines(fid);
    
    // Whale updates
    stepWhale(dt);
    if(fid===ST.floor){
 　 　const wEl=document.getElementById('whaleWrap');
 　　 if(wEl) wEl.style.transform=`translate(${whale.x}px,${CCY}px)`;
    }
    saveAccum+=dt;
    if(saveAccum>=15000&&mentalDirty){saveData();saveAccum=0;}
    animRafs[fid]=requestAnimationFrame(loop);
  }
  animRafs[fid]=requestAnimationFrame(loop);
}

      selPersonality=lbl.dataset.pkey;
      document.querySelectorAll('.ptag-radio').forEach(l=>l.classList.remove('sel'));
      lbl.classList.add('sel');
    });
  });
}

function initModal(){
  const fs=document.getElementById('iFloor');
  fs.innerHTML=FLOOR_ORDER.map(fid=>`<option value="${fid}">${FLOOR_PLANS[fid].label} — ${FLOOR_PLANS[fid].name}</option>`).join('');
  fs.value=ST.floor;fs.addEventListener('change',updateRoomSel);updateRoomSel();
  document.getElementById('swatches').innerHTML=COLORS.map((c,i)=>`<div class="swatch${i===0?' sel':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join('');
  buildPersonalityRadios('');
  document.getElementById('fabBtn').onclick=openModal;
  document.getElementById('modalOv').onclick=closeModal;
  document.getElementById('subBtn').onclick=submitChar;
}

function updateRoomSel(){
  const fid=document.getElementById('iFloor').value;
  document.getElementById('iRoom').innerHTML=FLOOR_PLANS[fid].rooms
    .filter(r=>!ASSIGN_RESTRICTED.includes(r.id))
    .map(r=>`<option value="${r.id}">${getRoomName(fid,r.id)}</option>`).join('');
}

function pickColor(c,el2){
  selColor=c;
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel'));
  el2.classList.add('sel');
}

function openModal(){
  editCharId=null;
  document.getElementById('modalTitle').textContent='キャラクターを追加';
  document.getElementById('subBtn').textContent='追加する';
  document.getElementById('iName').value='';
  document.getElementById('iFloor').value=ST.floor;
  updateRoomSel();
  document.getElementById('iInfo').value='';
  selPersonality='';selColor=COLORS[0];
  buildPersonalityRadios('');
  document.querySelectorAll('.swatch').forEach((s,i)=>s.classList.toggle('sel',i===0));
  document.getElementById('addModal').classList.add('show');
  document.getElementById('modalOv').classList.add('show');
  setTimeout(()=>document.getElementById('iName').focus(),400);
}

function openEditModal(id){
  const ch=ST.chars.find(c=>c.id===id); if(!ch)return;
  editCharId=id;
  document.getElementById('modalTitle').textContent='キャラクターを編集';
  document.getElementById('subBtn').textContent='保存する';
  document.getElementById('iName').value=ch.name;
  document.getElementById('iFloor').value=ch.floor;
  updateRoomSel();
  document.getElementById('iRoom').value=ch.room;
  document.getElementById('iInfo').value=ch.info||'';
  selPersonality=ch.personality||'';selColor=ch.color;
  buildPersonalityRadios(selPersonality);
  document.querySelectorAll('.swatch').forEach(s=>{s.classList.toggle('sel',s.style.background===ch.color);});
  hidePanel('charPanel');
  document.getElementById('addModal').classList.add('show');
  document.getElementById('modalOv').classList.add('show');
}

function closeModal(){
  document.getElementById('addModal').classList.remove('show');
  document.getElementById('modalOv').classList.remove('show');
  editCharId=null;
}

function submitChar(){
  const name=document.getElementById('iName').value.trim();
  if(!name){
    document.getElementById('iName').style.borderColor='rgba(220,80,80,.5)';
    setTimeout(()=>document.getElementById('iName').style.borderColor='',800);return;
  }
  const floor=document.getElementById('iFloor').value;
  const room=document.getElementById('iRoom').value;
  const info=document.getElementById('iInfo').value.trim();

  if(editCharId){
    const ch=ST.chars.find(c=>c.id===editCharId);
    if(ch){
      const relocated=ch.floor!==floor||ch.room!==room;
      ch.name=name;ch.floor=floor;ch.room=room;ch.info=info;ch.personality=selPersonality;ch.color=selColor;
      if(relocated||!dotStates[ch.id]){delete dotStates[ch.id];initDotState(ch);}
      else{refreshDotLabel(ch);}
    }
    saveData();closeModal();hidePanels();
    if(floor!==ST.floor)ST.floor=floor;render();
  } else {
    const ch={
      id:Date.now().toString(36)+Math.random().toString(36).slice(2),
      name,floor,room,info,personality:selPersonality,color:selColor,mental:'normal'
    };
    ST.chars.push(ch);initDotState(ch);saveData();
    document.getElementById('iName').value='';document.getElementById('iInfo').value='';
    closeModal();if(ch.floor!==ST.floor)ST.floor=ch.floor;render();
  }
}

/* ============================================================
   PANELS
============================================================ */
function showPanel(id){document.getElementById('overlay').classList.add('show');document.getElementById(id).classList.add('show');}
function hidePanel(id){document.getElementById(id).classList.remove('show');}
function hidePanels(){hidePanel('roomPanel');hidePanel('charPanel');document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').onclick=hidePanels;

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ============================================================
   INIT
============================================================ */
loadData();initStars();initWhale();initModal();
FLOOR_ORDER.forEach(fid=>startAnim(fid));
render();
window.addEventListener('resize',()=>{buildFloorPlan(ST.floor);});
</script>

</body>
</html>
